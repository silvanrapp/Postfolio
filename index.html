<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Postfolio — Post + Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Fonts laden non-blocking (media-swap), damit der erste Seitenaufbau nicht
     auf die Schriftfamilien wartet. Die UI nutzt 'Helvetica Neue' (System);
     die Google-Fonts werden nur vom Text-Werkzeug gebraucht und dürfen
     nachladen. Kuratiertes Editorial-Set: Display/Headline (Bodoni Moda,
     Playfair Display, DM Serif Display, Bricolage Grotesque, Archivo) +
     elegante Sublines (Instrument Serif, Cormorant Garamond, Fraunces,
     Arapey, Poppins). -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Arapey:ital@0;1&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300..900;1,300..900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Arapey:ital@0;1&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300..900;1,300..900&display=swap"></noscript>
<!-- JSZip wird nur beim Export gebraucht → defer, blockiert das Parsen nicht. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
<style>
:root {
  --bg: #F4F1EB;
  --surface: #FFFFFF;
  --text: #2A2826;
  --muted: #9B948A;
  --line: #D8D1C6;
  --accent: #D10101;
  --dark: #2A2826;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
/* Die App füllt genau eine Bildschirmhöhe und scrollt selbst NICHT — nur die
   Werkzeugleiste (horizontal) und die Leinwand (innerhalb ihres Rahmens)
   scrollen. So gibt es kein vertikales „Wackeln" der ganzen Seite auf dem
   iPhone. overscroll-behavior:none unterdrückt zusätzlich den Gummiband-Effekt. */
body {
  background: var(--bg);
  font-family: 'Helvetica Neue', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100dvh;
  padding: 16px;
  gap: 14px;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;        /* keine Browser-Pinch-Zoom/-Pan-Gesten auf der Seite */
}
#appHeader {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#brandBlock { display: flex; align-items: center; gap: 9px; text-align: left; }
#logoMark { width: 30px; height: 30px; flex: 0 0 auto; display: block; }
#brandText { display: flex; flex-direction: column; }
/* Wortmarke: editorial-Serif, etwas präsenter, mit klarer Nutzen-Zeile. */
#appHeader h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--text);
  text-transform: none;
}
#appHeader .tagline {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 5px;
}
#headerActions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hint { font-size: 12px; color: var(--text); text-align: left; }
/* Aufgeräumte Legende: kleine Abschnitts-Überschriften + Key/Bedeutung-Raster */
.hint h4 {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); font-weight: 600; margin: 12px 0 5px;
}
.hint h4:first-child { margin-top: 0; }
.hint .kv {
  display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px;
  font-size: 12px; line-height: 1.35;
}
.hint .kv b { font-weight: 600; color: var(--text); white-space: nowrap; }
.hint .kv span { color: var(--muted); }
.hint .legend { display: flex; flex-wrap: wrap; gap: 7px 14px; }
.hint .legend i {
  display: inline-flex; align-items: center; gap: 6px;
  font-style: normal; font-size: 12px; color: var(--muted);
}
.hint .legend .d { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
details.hint-details { position: relative; }
details.hint-details summary {
  list-style: none;
  cursor: pointer;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--line);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
details.hint-details summary::-webkit-details-marker { display: none; }
details.hint-details .hint {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 284px;
  max-width: calc(100vw - 24px);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.08);
  z-index: 80;
}
/* ── Controls ── */
#mainToolbar {
  display: flex;
  flex-wrap: nowrap;          /* immer EINE Reihe — passt sich adaptiv an */
  gap: 7px;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 100%;
}
#mainToolbar > * { flex-shrink: 0; }
#mainToolbar .row { gap: 5px; }
button {
  border: none;
  padding: 0 16px;
  height: 40px;
  border-radius: 8px;
  font-size: 13px;
  letter-spacing: 0.01em;
  cursor: pointer;
  text-transform: none;
  font-family: inherit;
  background: transparent;
  color: var(--text);
}

/* Button hierarchy: primary (dark, single most important action),
   secondary (outline, toggled state fills dark), tertiary (small
   neutral chip for minor/repeated actions). Red is reserved for the
   export accent and destructive (delete) actions only. */
.btn-primary {
  background: var(--dark); color: var(--bg); border: none;
}
.btn-secondary {
  background: transparent; color: var(--text);
  border: 1px solid var(--line);
}
.btn-secondary.sel, .btn-secondary.active {
  background: var(--dark); color: var(--bg); border-color: var(--dark);
}
.btn-tertiary {
  background: #ECE7DC; color: var(--text); border: none;
}

/* Export — moved into the header, small circular icon button.
   This is the one deliberate exception to "dark = primary": export is
   the single most important action, accented in the brand red so it
   stays unmistakably findable without competing with the toolbar. */
#exportWrap { position: relative; }
#exportBtn {
  width: 38px; height: 38px; padding: 0; border-radius: 50%;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
}
#exportBtn svg { width: 16px; height: 16px; }
#exportMenu {
  display: none; position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--surface); border: 1px solid var(--line); z-index: 100;
  min-width: 150px; border-radius: 10px; overflow: hidden;
  box-shadow: 0 10px 28px rgba(0,0,0,0.1);
}
#exportMenu.show { display: block; }
#exportMenu button {
  display: block; width: 100%; text-align: left; height: auto;
  background: var(--surface); color: var(--text); border: none;
  border-radius: 0;
  padding: 12px 15px; font-size: 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--bg);
}
#exportMenu button:last-child { border-bottom: none; }
#exportMenu button:hover { background: var(--bg); }
#deleteBtn {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  display: none;
  align-items: center;
  gap: 6px;
}
#deleteBtn svg { flex: 0 0 auto; }
#deleteBtn.show { display: inline-flex; }
#cropBtn {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--line);
  display: none;
}
#cropBtn.show { display: inline-block; }

.frame-btn {
  background: transparent; color: var(--text);
  border: 1px solid var(--line);
  font-size: 11px; letter-spacing: 0.02em; padding: 0 10px;
  height: 32px; text-transform: none;
}
.frame-btn.sel { background: var(--dark); color: var(--bg); border-color: var(--dark); }
#fitBtn { background: var(--dark); color: var(--bg); height: 32px; font-size: 11px; padding: 0 10px; }

.mode-btn {
  background: transparent; color: var(--text);
  border: 1px solid var(--line);
  font-size: 12px; letter-spacing: 0.01em; padding: 0 12px;
  height: 34px; text-transform: none;
}
.mode-btn.sel { background: var(--dark); color: var(--bg); border-color: var(--dark); }

/* Eingeklapptes Format-Menü */
#formatWrap { position: relative; }
#formatToggle {
  background: var(--dark); color: var(--bg); border: 1px solid var(--dark);
  font-size: 12px; height: 34px; padding: 0 12px; border-radius: 8px;
}
#formatMenu {
  display: none; position: fixed; top: 0; left: 0; /* Position per JS, damit es
    nicht von der scrollenden Toolbar abgeschnitten wird */
  background: var(--surface); border: 1px solid var(--line); z-index: 200;
  min-width: 130px; border-radius: 10px; overflow: hidden;
  box-shadow: 0 10px 28px rgba(0,0,0,0.1);
}
#formatMenu.show { display: block; }
#formatMenu .mode-btn {
  display: block; width: 100%; text-align: left; height: auto;
  border: none; border-radius: 0; padding: 11px 14px;
  border-bottom: 1px solid var(--bg);
}
#formatMenu .mode-btn:last-child { border-bottom: none; }
#formatMenu .mode-btn.sel { background: var(--bg); color: var(--text); }

/* Text-Dropdown: bündelt + Blank / Editorial / Magazine */
#textWrap { position: relative; }
#textToggle {
  background: transparent; color: var(--text);
  border: 1px solid var(--line); border-radius: 8px;
  height: 40px; padding: 0 14px; font-size: 13px;
}
#textMenu {
  display: none; position: fixed; top: 0; left: 0; /* Position per JS, damit es
    nicht von der scrollenden Toolbar abgeschnitten wird */
  background: var(--surface); border: 1px solid var(--line); z-index: 200;
  min-width: 160px; border-radius: 10px; overflow: hidden;
  box-shadow: 0 10px 28px rgba(0,0,0,0.1);
}
#textMenu.show { display: block; }
#textMenu { padding: 6px; min-width: 248px; }
.tm-item {
  display: flex; align-items: center; gap: 11px;
  width: 100%; text-align: left; height: auto;
  background: transparent; color: var(--text);
  border: none; border-radius: 9px; padding: 9px 10px;
}
.tm-item:hover { background: var(--bg); }
.tm-ico {
  flex: 0 0 auto; width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', Georgia, serif; font-size: 17px; color: var(--text);
}
.tm-txt { display: flex; flex-direction: column; line-height: 1.25; }
.tm-txt b { font-size: 13px; font-weight: 600; }
.tm-txt small { font-size: 11px; color: var(--muted); }
.tm-sep {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); padding: 9px 10px 4px;
}
/* Mini-Vorschau in den echten Schriften, damit der Look sofort klar ist */
.tm-prev {
  flex: 0 0 auto; width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  color: var(--text); overflow: hidden; white-space: nowrap;
}
.tm-prev-ed { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 11px; }
.tm-prev-ed i { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; margin-right: 1px; }
.tm-prev-mag { font-family: 'Bodoni Moda', serif; font-weight: 700; font-size: 7px; letter-spacing: 0.04em; }

/* "New" (clear canvas) — Trash-Icon + Label, eindeutig vs. Undo/Redo */
#newBtn {
  display: flex; align-items: center; gap: 4px;
  height: 30px; padding: 0 10px; border-radius: 999px;
  border: 1px solid var(--line); background: transparent; color: var(--muted);
  font-size: 12px;
}
#newBtn svg { width: 13px; height: 13px; }
#newBtn:hover { color: var(--accent); border-color: var(--accent); }

.row { display: flex; align-items: center; gap: 6px; }
/* BORDER-Reihe immer in EINER Zeile (notfalls seitlich scrollbar). */
#frameCtrl { flex-wrap: nowrap; overflow-x: auto; max-width: 100%; }
#frameCtrl::-webkit-scrollbar { height: 0; }
.label {
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase;
}
.icon-btn {
  width: 28px; height: 28px;
  padding: 0; line-height: 28px; text-align: center;
  background: #ECE7DC; color: var(--text);
  font-size: 14px; border-radius: 50%;
}
#slotLabel {
  font-size: 11px; color: var(--muted); min-width: 24px; text-align: center;
}
#slideCount { font-size: 12px; color: var(--text); min-width: 28px; text-align: center; }

.bg-btn {
  width: 22px; height: 22px;
  border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; padding: 0;
}
.bg-btn.sel { border-color: var(--accent); }
.bg-btn.beige { background: #F4F1EB; box-shadow: 0 0 0 1px var(--line); }
.bg-btn.white { background: #ffffff; box-shadow: 0 0 0 1px var(--line); }
.bg-btn.black { background: #111111; }
.bg-btn.grey  { background: #888888; }
.bg-btn.red   { background: #D10101; }
#bgEyedropBtn {
  width: 22px; height: 22px;
  border-radius: 50%; padding: 0;
  background: #ECE7DC; color: var(--text);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
}
#bgEyedropBtn svg { width: 12px; height: 12px; pointer-events: none; }
#bgEyedropBtn.picking { background: var(--dark); color: var(--bg); border-color: var(--accent); }

/* Hex-Eingabefeld (Rahmen- & Hintergrundfarbe) — beliebige Farbe tippbar */
.hex-input {
  width: 78px; height: 30px; padding: 0 8px;
  border: 1px solid var(--line); border-radius: 7px;
  background: var(--surface); color: var(--text);
  font-family: ui-monospace, Menlo, monospace; font-size: 12px; letter-spacing: 0.02em;
}
.hex-input:focus { outline: none; border-color: var(--text); }

/* Background-Dropdown */
#bgWrap { position: relative; }
#bgToggle {
  display: flex; align-items: center; gap: 5px;
  background: transparent; color: var(--text);
  border: 1px solid var(--line); border-radius: 8px;
  height: 40px; padding: 0 9px;
}
#bgToggleSwatch {
  width: 20px; height: 20px; border-radius: 5px;
  box-shadow: 0 0 0 1px var(--line) inset; background: #F4F1EB; flex: 0 0 auto;
}
.bg-caret { font-size: 11px; color: var(--muted); }
#bgMenu {
  display: none; position: fixed; top: 0; left: 0; /* Position per JS */
  background: var(--surface); border: 1px solid var(--line); z-index: 200;
  border-radius: 12px; padding: 12px; box-shadow: 0 10px 28px rgba(0,0,0,0.1);
}
#bgMenu.show { display: block; }
.bg-menu-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

.clr-btn {
  width: 22px; height: 22px;
  border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; padding: 0;
}
.clr-btn.sel   { border-color: var(--accent); }
.clr-btn.beige { background: #F4F1EB; box-shadow: 0 0 0 1px var(--line); }
.clr-btn.white { background: #ffffff; box-shadow: 0 0 0 1px var(--line); }
.clr-btn.black { background: #111111; }
.clr-btn.grey  { background: #888888; }
.clr-btn.red   { background: var(--accent); }

#frameEyedropBtn {
  width: 22px; height: 22px;
  border-radius: 50%; padding: 0;
  background: #ECE7DC; color: var(--text);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
}
#frameEyedropBtn svg { width: 12px; height: 12px; pointer-events: none; }
#frameEyedropBtn.picking { background: var(--dark); color: var(--bg); border-color: var(--accent); }
canvas.picking-color { cursor: crosshair; }

.style-btn {
  background: transparent; color: var(--text);
  border: 1px solid var(--line);
  font-size: 12px; padding: 0;
  width: 30px; height: 30px;
}
.style-btn.sel { background: var(--dark); color: var(--bg); border-color: var(--dark); }
.style-btn[data-style="bold"]      { font-weight: 700; }
.style-btn[data-style="italic"]    { font-style: italic; }
.style-btn[data-style="underline"] { text-decoration: underline; }

/* Text-Controls: zwei adaptive Reihen — (1) Schrift + Gewicht, (2) B/I/U + Farbe */
#textCtrl { flex-direction: column; gap: 8px; align-items: stretch; width: 100%; max-width: 560px; }
#textCtrl .tc-row { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
#textCtrl .tc-row select { flex: 1 1 0; min-width: 0; }
#textCtrl #textContentInput { width: 100%; }
.tc-gap { flex: 1 1 auto; }
#tc-track-row { gap: 10px; }
#tc-track-row input[type=range] { flex: 1 1 auto; min-width: 0; }
.tc-track-ico { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; }
#trackVal { font-size: 11px; color: var(--muted); min-width: 26px; text-align: right; }
#textCtrl select {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text);
  font-size: 12px;
  height: 32px;
  padding: 0 8px;
  font-family: inherit;
  cursor: pointer;
  border-radius: 8px;
}
#textCtrl input[type="text"] {
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  height: 32px;
  padding: 0 9px;
  min-width: 140px;
  font-family: inherit;
  border-radius: 8px;
}

/* ── Main toolbar: always-visible, selection-independent actions ── */
/* (#mainToolbar base rule defined above, shared with #controls legacy name) */

/* ── Context sheet: appears only while something is selected.
   Floats above the canvas instead of pushing it down, so the canvas
   never resizes depending on selection state. ── */
#contextSheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 60;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--surface);
  border-top: 1px solid var(--line);
  box-shadow: 0 -6px 24px rgba(0,0,0,0.08);
  padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
  max-height: 48vh;
  overflow-y: auto;
  transform: translateY(110%);
  transition: transform 0.22s ease;
}
#contextSheet.show { transform: translateY(0); }
#contextSheet .row { flex-wrap: wrap; }
#contextTop { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

@media (max-width: 600px) {
  body { padding: 10px; gap: 10px; }
  #appHeader h1 { font-size: 18px; }
  #mainToolbar { gap: 5px; }
  /* Auf sehr schmalen Geräten Beschriftungen weglassen, damit alles in eine
     Reihe passt (Symbole/Stepper bleiben). */
  #mainToolbar .label { display: none; }
  #formatToggle, #textToggle { padding: 0 10px; }
  #mainToolbar .icon-btn { width: 30px; height: 30px; }
  /* BORDER-Reihe kompakt, damit None·1–5·All·Fit in eine Zeile passen. */
  #frameCtrl { gap: 5px; }
  #frameCtrl .label { display: none; }
  #frameCtrl .frame-btn { padding: 0 9px; }
  #frameCtrl #frameAllBtn, #frameCtrl #fitBtn { padding: 0 11px; }
}

/* ── Canvas area: editorial/print presentation — the canvas is the
   product, the controls are just there to serve it. ── */
#canvas-wrap {
  position: relative;
  flex: 1 1 auto;        /* füllt den Platz zwischen Toolbar und unterem Rand */
  min-height: 0;         /* erlaubt Schrumpfen im Flex-Layout statt Überlauf */
  display: flex; align-items: center; justify-content: safe center; /* Slide zentriert */
  width: 100%;           /* volle Breite — sonst „kollabiert" der Rahmen auf die Leinwandbreite */
  overflow-x: auto;
  overflow-y: hidden;    /* keine vertikale Bewegung — nur seitlich zwischen Slides */
  max-width: 100vw;
  background: #EDE8DF;
  padding: 18px;
  border-radius: 18px;
  -webkit-overflow-scrolling: touch;
  /* Nur horizontales Panen (zwischen Slides). Pinch-Zoom des Browsers ist
     deaktiviert; das Zwei-Finger-Resize/Rotate eines Fotos ruft beim Ziehen
     preventDefault auf. So bewegt sich sonst nichts. */
  touch-action: pan-x;
  /* Always-visible horizontal scrollbar (Firefox) — trackpad swipe scrolls
     this natively; the bar itself just stays visible instead of OS auto-hide. */
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
canvas {
  display: block;
  border-radius: 2px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.1);
}
/* Always-visible horizontal scrollbar (WebKit/Chromium) */
#canvas-wrap::-webkit-scrollbar { height: 8px; }
#canvas-wrap::-webkit-scrollbar-track { background: transparent; }
#canvas-wrap::-webkit-scrollbar-thumb {
  background: var(--line); border-radius: 4px;
}
#canvas-wrap::-webkit-scrollbar-thumb:hover { background: #A8A39C; }

/* Zoom controls — kept deliberately quiet: small, translucent, monochrome
   line glyphs instead of solid dark filled buttons, so it reads as a
   secondary utility rather than competing with the canvas. */
#zoomCtrl {
  position: fixed;
  bottom: 14px; right: 14px;
  transition: bottom 0.15s ease;
  z-index: 65;
  display: flex; align-items: center; gap: 2px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 999px;
  padding: 4px 6px;
}
#zoomCtrl .icon-btn {
  width: 22px; height: 22px;
  padding: 0; line-height: 22px;
  font-size: 12px;
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
}
#zoomCtrl .icon-btn:hover { color: var(--text); }
#zoomLabel { font-size: 11px; color: var(--muted); min-width: 34px; text-align: center; cursor: pointer; user-select: none; padding: 2px 2px; }
#zoomToggle svg { width: 15px; height: 15px; }
/* Eingeklappt: nur das Lupen-Icon. Controls (−/%/+/⊡) erst nach Tippen. */
#zoomCtrl:not(.expanded) #zoomOut,
#zoomCtrl:not(.expanded) #zoomIn,
#zoomCtrl:not(.expanded) #zoomFit,
#zoomCtrl:not(.expanded) #zoomLabel { display: none; }
#zoomCtrl.expanded #zoomToggle { display: none; }
#previewBtn svg { width: 15px; height: 15px; }

/* Vollbild-Vorschau */
#preview { display: none; position: fixed; inset: 0; z-index: 700; background: #0b0b0b; }
#preview.show { display: block; }
#preview-track {
  display: flex; height: 100%; overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; touch-action: pan-x;
}
.pv-panel {
  flex: 0 0 100%; width: 100vw; height: 100%; scroll-snap-align: center;
  display: flex; align-items: center; justify-content: center; padding: 18px;
}
.pv-panel img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 2px; box-shadow: 0 12px 50px rgba(0,0,0,0.5); }
#preview-close {
  position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); right: 14px; z-index: 2;
  width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.16);
  color: #fff; border: none; font-size: 18px; cursor: pointer;
}
#preview-dots { position: absolute; bottom: calc(18px + env(safe-area-inset-bottom, 0px)); left: 0; right: 0; display: flex; gap: 7px; justify-content: center; z-index: 2; }
#preview-dots .pvd { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.35); }
#preview-dots .pvd.on { background: #fff; }

/* Slide dots */
#dots { display: flex; gap: 7px; align-items: center; }
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--line); cursor: pointer;
  transition: background .15s, transform .15s;
}
.dot.on { background: var(--text); transform: scale(1.35); }

/* Loading */
#loading {
  display: none; position: fixed; inset: 0;
  background: rgba(244,241,235,0.88); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; font-size: 11px; letter-spacing: 0.15em;
  color: #53504B; text-transform: uppercase;
}
#loading.show { display: flex; }
.spinner {
  width: 26px; height: 26px;
  border: 2px solid #C5C1BB; border-top-color: #D10101;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Export overlay */
#exp-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.9); z-index: 200;
  flex-direction: column; align-items: center; overflow-y: auto;
}
#exp-overlay.show { display: flex; }
#exp-header {
  position: sticky; top: 0; width: 100%;
  background: rgba(0,0,0,0.96);
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px; z-index: 5;
  flex-wrap: wrap; gap: 8px;
}
#exp-hint { font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: .1em; text-transform: uppercase; flex: 1 1 auto; min-width: 0; }
#exp-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
#downloadAllBtn, #shareAllBtn { background: #D10101; color: white; padding: 8px 14px; font-size: 11px; display: none; white-space: nowrap; flex-shrink: 0; height: auto; }
#downloadAllBtn.show, #shareAllBtn.show { display: inline-block; }
#downloadAllBtn:disabled, #shareAllBtn:disabled { opacity: 0.6; cursor: default; }
#closeExp { background: #53504B; color: white; padding: 8px 14px; font-size: 11px; white-space: nowrap; flex-shrink: 0; height: auto; }
#exp-list { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 16px; width: 100%; }
.exp-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.exp-item img { max-width: min(90vw, 280px); box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
.exp-item span { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: .1em; text-transform: uppercase; }
.dl-btn { background: #D10101; color: white; font-size: 10px; padding: 8px 14px; }

/* Dezente Outro-Einladung im Export-Overlay */
#promoInvite { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 9px 14px; padding: 12px 18px 0; }
#promoInvite.hidden { display: none; }
.pi-text { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.02em; text-align: center; }
.pi-actions { display: flex; gap: 8px; }
#promoInvite button {
  background: transparent; color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
  font-size: 11px; padding: 7px 12px; height: auto; white-space: nowrap;
}
#promoInvite button:hover { border-color: rgba(255,255,255,0.7); }

/* Crop overlay */
#crop-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.94); z-index: 300;
  flex-direction: column; align-items: center;
}
#crop-overlay.show { display: flex; }
#crop-header {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px; gap: 10px;
}
#crop-title { font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); text-transform: uppercase; }
#crop-actions { display: flex; gap: 8px; }
#cropCancel { background: rgba(255,255,255,0.14); color: white; font-size: 12px; padding: 9px 16px; border-radius: 9px; }
#cropApply  { background: #D10101; color: white; font-size: 12px; padding: 9px 18px; border-radius: 9px; }

/* Aufgeräumtes Preset-Panel: dezente Karte, klar gruppiert, größere
   Tap-Ziele. „Format" = klassische Seitenverhältnisse, „Layout" = Reihen/
   Spalten (nur die Anzahl als Zahl, Achse sagt die Gruppen-Überschrift). */
#crop-presets {
  display: flex; flex-direction: column; gap: 14px;
  padding: 14px 16px; margin: 4px 12px 0;
  width: min(560px, calc(100% - 24px));
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
}
.preset-group { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.preset-label {
  width: 100%;
  font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.45);
  text-transform: uppercase; margin-bottom: 2px;
}
.ratio-btn {
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.18);
  font-size: 12px; letter-spacing: 0.02em; padding: 9px 14px;
  border-radius: 9px; min-width: 44px; text-align: center;
}
.ratio-btn[data-axis] { min-width: 40px; font-weight: 600; }
.ratio-btn.sel { background: #D10101; color: white; border-color: #D10101; }
#crop-stage {
  flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
  overflow: auto; padding: 16px;
}
#cropCanvas { touch-action: none; box-shadow: 0 4px 30px rgba(0,0,0,0.6); }

/* Farb-Lupe */
#loupe { position: fixed; display: none; width: 96px; pointer-events: none; z-index: 600; text-align: center; }
#loupe.show { display: block; }
#loupeCanvas {
  width: 96px; height: 96px; border-radius: 50%;
  border: 3px solid #fff; box-shadow: 0 4px 18px rgba(0,0,0,0.3);
  background: #fff; display: block;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
#loupeHex {
  margin-top: 5px; display: inline-block;
  font-family: ui-monospace, Menlo, monospace; font-size: 11px; letter-spacing: 0.04em;
  color: #fff; background: rgba(42,40,38,0.92); padding: 3px 7px; border-radius: 6px;
}

/* ── Startansicht / Splash ── */
#splash {
  position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
}
#splash.hidden { display: none; }
.splash-inner {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  gap: 16px; width: 100%; max-width: 360px;
}
.splash-mark { width: 80px; height: 80px; }
.splash-wm {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px; font-weight: 600; letter-spacing: -0.02em;
  color: var(--text); line-height: 1;
}
.splash-rule { width: 36px; height: 1px; background: #C9C2B6; }
.splash-tag {
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
}
#splashStart {
  margin-top: 14px; width: 100%; max-width: 280px; height: auto;
  background: var(--dark); color: var(--bg); border: none;
  border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 500; cursor: pointer;
}
#splashStart:active { transform: scale(0.99); }
.splash-credit {
  position: absolute;
  bottom: calc(26px + env(safe-area-inset-bottom, 0px));
  left: 0; right: 0; text-align: center;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
}
@media (max-width: 600px) {
  .splash-wm { font-size: 40px; }
}
</style>
</head>
<body>

<div id="appHeader">
  <div id="brandBlock">
    <svg id="logoMark" viewBox="0 0 34 34" aria-hidden="true">
      <rect x="1" y="1" width="32" height="32" rx="8" fill="#2A2826"/>
      <text x="16.5" y="24" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="21" font-weight="600" fill="#F4F1EB">P</text>
      <circle cx="25" cy="9" r="2" fill="#D10101"/>
    </svg>
    <h1>Postfolio</h1>
  </div>
  <div id="headerActions">
    <button class="icon-btn" id="undoBtn" title="Undo (⌘/Ctrl+Z)" aria-label="Undo" disabled>↶</button>
    <button class="icon-btn" id="redoBtn" title="Redo (⌘/Ctrl+Shift+Z)" aria-label="Redo" disabled>↷</button>
    <button id="newBtn" title="New project — start with a blank canvas" aria-label="New project">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 11.5v5"/><path d="M9.5 14h5"/></svg>
      <span>New</span>
    </button>
    <div id="exportWrap">
      <button id="exportBtn" title="Export" aria-label="Export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M5 21h14"/></svg>
      </button>
      <div id="exportMenu">
        <button id="exportAllBtn">All slides</button>
        <button id="exportOneBtn">This slide</button>
      </div>
    </div>
  </div>
</div>

<div id="mainToolbar">
  <!-- Format eingeklappt: ein Chip zeigt das aktive Format; Tippen öffnet die
       Auswahl, nach der Wahl klappt sie wieder zu — spart dauerhaft Platz. -->
  <div id="formatWrap">
    <button id="formatToggle" title="Choose format">Post 4:5 ▾</button>
    <div id="formatMenu">
      <button class="mode-btn sel" data-mode="post">Post 4:5</button>
      <button class="mode-btn" data-mode="story">Story 9:16</button>
    </div>
  </div>

  <div class="row">
    <span class="label">Slides</span>
    <button class="icon-btn" id="rmSlide">−</button>
    <span id="slideCount">1</span>
    <button class="icon-btn" id="addSlide">+</button>
  </div>

  <!-- Foto laden: kein Toolbar-Button mehr — man tippt das „+" in der Slide-Mitte an. -->
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <!-- Add: Foto & alle Text-Aktionen gebündelt in einem Dropdown -->
  <div id="textWrap">
    <button id="textToggle" title="Add a photo or text">Add ▾</button>
    <div id="textMenu">
      <button id="addPhotoMenuBtn" class="tm-item" title="Add a photo to the current slide">
        <span class="tm-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#2A2826" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5L5 19"/></svg></span>
        <span class="tm-txt"><b>Add photo</b><small>Place on the current slide</small></span>
      </button>
      <div class="tm-sep">Text</div>
      <button id="addTextBtn" class="tm-item" title="Add a plain, editable text box">
        <span class="tm-ico">T</span>
        <span class="tm-txt"><b>Add text</b><small>Any words, symbols &amp; emoji</small></span>
      </button>
      <button id="presetEditorialBtn" class="tm-item" title="Editorial duo: italic subline over a caps serif headline">
        <span class="tm-prev tm-prev-ed"><i>Le</i> PORT</span>
        <span class="tm-txt"><b>Editorial</b><small>Italic + caps serif</small></span>
      </button>
      <button id="presetMagazinBtn" class="tm-item" title="Magazine duo: caps headline with a clean sans subline">
        <span class="tm-prev tm-prev-mag">MAISON</span>
        <span class="tm-txt"><b>Magazine</b><small>Caps serif + sans</small></span>
      </button>
      <div class="tm-sep">Frames · photo + inset</div>
      <button id="frames1Btn" class="tm-item" title="Background photo with a centered framed inset">
        <span class="tm-prev"><svg viewBox="0 0 24 30" width="17" height="21" aria-hidden="true"><rect x="1" y="1" width="22" height="28" rx="2" fill="none" stroke="#9B948A" stroke-width="1.5"/><rect x="6.5" y="9" width="11" height="12" rx="1" fill="none" stroke="#2A2826" stroke-width="1.5"/></svg></span>
        <span class="tm-txt"><b>Frames · single</b><small>1 photo + inset</small></span>
      </button>
      <button id="frames2Btn" class="tm-item" title="Two stacked bands, each with a framed inset">
        <span class="tm-prev"><svg viewBox="0 0 24 30" width="17" height="21" aria-hidden="true"><rect x="1" y="1" width="22" height="13.5" rx="2" fill="none" stroke="#9B948A" stroke-width="1.5"/><rect x="7" y="4.5" width="10" height="6.5" rx="1" fill="none" stroke="#2A2826" stroke-width="1.5"/><rect x="1" y="15.5" width="22" height="13.5" rx="2" fill="none" stroke="#9B948A" stroke-width="1.5"/><rect x="7" y="19" width="10" height="6.5" rx="1" fill="none" stroke="#2A2826" stroke-width="1.5"/></svg></span>
        <span class="tm-txt"><b>Frames · 2 stacked</b><small>The classic look</small></span>
      </button>
      <button id="frames3Btn" class="tm-item" title="Three stacked bands — great for 9:16 stories">
        <span class="tm-prev"><svg viewBox="0 0 24 30" width="17" height="21" aria-hidden="true"><rect x="1" y="1" width="22" height="8.7" rx="1.5" fill="none" stroke="#9B948A" stroke-width="1.4"/><rect x="1" y="10.7" width="22" height="8.7" rx="1.5" fill="none" stroke="#9B948A" stroke-width="1.4"/><rect x="1" y="20.4" width="22" height="8.7" rx="1.5" fill="none" stroke="#9B948A" stroke-width="1.4"/></svg></span>
        <span class="tm-txt"><b>Frames · 3 stacked</b><small>Best for 9:16 stories</small></span>
      </button>
    </div>
  </div>

  <!-- Hintergrund als kompaktes Dropdown -->
  <div id="bgWrap">
    <button id="bgToggle" title="Background color" aria-label="Background color"><span id="bgToggleSwatch"></span><span class="bg-caret">▾</span></button>
    <div id="bgMenu">
      <div class="bg-menu-row">
        <button class="bg-btn beige sel" data-bg="#F4F1EB" title="Beige"></button>
        <button class="bg-btn white"     data-bg="#ffffff" title="White"></button>
        <button class="bg-btn black"     data-bg="#111111" title="Black"></button>
        <button class="bg-btn grey"      data-bg="#888888" title="Grey"></button>
        <button class="bg-btn red"       data-bg="#D10101" title="Red"></button>
        <button id="bgEyedropBtn" title="Pick background color from the image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m2 22 1-1h3l9-9"/>
            <path d="M3 21v-3l9-9"/>
            <path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/>
          </svg>
        </button>
      </div>
      <input type="text" id="bgHexInput" class="hex-input" maxlength="7" placeholder="#hex" autocomplete="off" autocapitalize="off" spellcheck="false" title="Type any hex color">
    </div>
  </div>
</div>

<!-- Context sheet: only relevant while a photo/text item is selected.
     Floats over the bottom of the canvas instead of taking up fixed
     vertical space, so the canvas size never depends on selection state. -->
<div id="contextSheet">
  <div class="row" id="contextTop">
    <button id="deleteBtn" title="Delete photo" aria-label="Delete">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
    </button>
    <button id="cropBtn">Crop</button>
    <div class="row" id="layerCtrl" style="display:none">
      <span class="label">Layer</span>
      <button class="icon-btn" id="layerBack"  title="Send to Back">⇊</button>
      <button class="icon-btn" id="layerDown"  title="Send Backward">↓</button>
      <button class="icon-btn" id="layerUp"    title="Bring Forward">↑</button>
      <button class="icon-btn" id="layerFront" title="Bring to Front">⇈</button>
    </div>
  </div>

  <div class="row" id="frameCtrl" style="display:none">
    <span class="label">Border</span>
    <button class="frame-btn sel" data-frame="none" title="No border">None</button>
    <button class="frame-btn" data-frame="s1" title="Border 1 · 8 px (very thin)">1</button>
    <button class="frame-btn" data-frame="s2" title="Border 2 · 18 px (thin)">2</button>
    <button class="frame-btn" data-frame="s3" title="Border 3 · 30 px (medium)">3</button>
    <button class="frame-btn" data-frame="s4" title="Border 4 · 40 px (bold)">4</button>
    <button class="frame-btn" data-frame="s5" title="Border 5 · 52 px (thick)">5</button>
    <button id="frameAllBtn" title="Apply current border (width + color) to ALL photos">All</button>
    <button id="fitBtn" title="Fit photo into slide / border (Enter)">Fit ⏎</button>
  </div>

  <div class="row" id="frameColorCtrl" style="display:none">
    <span class="label">Color</span>
    <button class="clr-btn white sel" data-frameclr="#ffffff" title="White"></button>
    <button class="clr-btn black"     data-frameclr="#111111" title="Black"></button>
    <button class="clr-btn beige"     data-frameclr="#F4F1EB" title="Beige"></button>
    <button class="clr-btn grey"      data-frameclr="#888888" title="Grey"></button>
    <button class="clr-btn red"        data-frameclr="#D10101" title="Red"></button>
    <button id="frameEyedropBtn" title="Pick color from photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m2 22 1-1h3l9-9"/>
        <path d="M3 21v-3l9-9"/>
        <path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/>
      </svg>
    </button>
    <input type="text" id="frameHexInput" class="hex-input" maxlength="7" placeholder="#hex" autocomplete="off" autocapitalize="off" spellcheck="false" title="Type any hex color">
  </div>

  <div id="textCtrl" style="display:none">
    <input type="text" id="textContentInput" placeholder="Your text" maxlength="120">
    <div class="tc-row">
      <select id="fontSelect" title="Font">
        <optgroup label="Headline · bold / caps">
          <option value="Bodoni Moda">Bodoni Moda</option>
          <option value="Playfair Display">Playfair Display</option>
          <option value="DM Serif Display">DM Serif Display</option>
          <option value="Bricolage Grotesque">Bricolage Grotesque</option>
          <option value="Archivo">Archivo</option>
        </optgroup>
        <optgroup label="Subline · elegant / light">
          <option value="Instrument Serif">Instrument Serif</option>
          <option value="Cormorant Garamond">Cormorant Garamond</option>
          <option value="Fraunces">Fraunces</option>
          <option value="Arapey">Arapey</option>
          <option value="Poppins">Poppins</option>
        </optgroup>
      </select>
      <select id="weightSelect" title="Weight">
        <option value="300">Light</option>
        <option value="400">Regular</option>
        <option value="600">Semibold</option>
      </select>
    </div>
    <div class="tc-row">

<script>
// ═══════════════════════════════════════
// SETUP
// ═══════════════════════════════════════

// Two selectable formats — Post (Instagram feed, 4:5) and Story (9:16).
// W/H are the CURRENT format's slide size in logical px; every aspect-ratio
// dependent calculation in the app (crop split ratios, canvas scale, smart
// guides, export) reads these two variables live, so switching format
// re-derives everything automatically. See setMode() below.
const MODES = {
  post:  { w: 1080, h: 1350, label: 'Post 4:5'   },
  story: { w: 1080, h: 1920, label: 'Story 9:16' }
};
let mode = 'post';
let W = MODES[mode].w, H = MODES[mode].h;

const DPR = window.devicePixelRatio || 1;
// BASE_DSCALE is the auto-fit display scale for the current format (one
// slide roughly filling the available viewport). `zoom` is a user-controlled
// multiplier on top of it — zoom out to see an overview of every slide at
// once, zoom in for fine detail work. DSCALE/S stay mutable so every place
// that reads them (drawing, drag math, mouse↔logical conversion) picks up
// the new scale immediately after setZoom() or a format switch runs.
let BASE_DSCALE = 0.44;
const ZOOM_MIN = 0.2, ZOOM_MAX = 2.5;
let zoom   = 1;
let DSCALE = BASE_DSCALE * zoom;
let S      = DSCALE * DPR; // canvas draw units per logical unit
const EX   = 3;            // export multiplier

// Recomputes BASE_DSCALE/DSCALE/S for the current H — called once at load
// and again whenever the format switch changes H (Post vs. Story have
// different heights, so the same width-based scale would over/undersize
// the canvas).
// Skaliert die Leinwand so, dass eine Slide IMMER vollständig in den sichtbaren
// Bereich des Leinwand-Rahmens passt — mit Sicherheitsrand und zentriert. Der
// Rahmen schrumpft, wenn unten das Werkzeug-Panel offen ist (margin-bottom),
// daher rechnen wir mit der echten clientHeight/Width des Rahmens.
function computeScale() {
  const pad = 18, safety = 14;
  let availH, availW;
  try {
    availH = wrap.clientHeight - pad * 2 - safety;
    availW = wrap.clientWidth  - pad * 2 - safety;
  } catch (e) { /* wrap noch nicht definiert (Erstaufruf) */ }
  if (!availH || availH < 80) availH = window.innerHeight - 200;
  if (!availW || availW < 80) availW = window.innerWidth - 52;
  // Slide so groß wie möglich: füllt die kürzere verfügbare Achse, kein Cap.
  BASE_DSCALE = Math.min(availH / H, availW / W);
  DSCALE = BASE_DSCALE * zoom;
  S = DSCALE * DPR;
}
computeScale();

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
const isIOS  = /iP(hone|ad|od)/.test(navigator.userAgent);

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════

let slides      = [{ bg: '#F4F1EB' }];
let photos      = []; // { img, cx, cy, w, h, rot }
let sel         = -1; // selected photo index
let activeSlide = 0;
let guides      = []; // active smart guides { type:'v'|'h', pos:number }

// Interaction state
let dragMode    = null; // 'move' | 'rotate' | 'resize' | null
let armUndo     = false; // beim Gesten-Start gesetzt; der erste echte Move legt EINEN Undo-Schritt an (reiner Klick ohne Bewegung erzeugt keinen)
let tapAlreadySelected = false; // war das angetippte Element schon ausgewählt? (Frames: 1. Tipp = wählen, 2. Tipp = Upload)
let dragStartCX = 0, dragStartCY = 0;
let dragStartMX = 0, dragStartMY = 0;
let dragStartRot = 0, dragStartAngle = 0;
let dragStartDist = 0, dragStartW = 0, dragStartH = 0; // for corner-handle resize
let pinchData   = null; // { dist, angle, w, h, rot }

// Click/tap on empty canvas → add a photo at that exact spot
let addCandidate  = null; // { lx, ly, mx, my } while a click/tap on empty space is in progress
let pendingAddPos = null; // { cx, cy } logical position for the next file picked
let pendingReplaceIdx = -1; // Index eines Frames-Platzhalters, der gerade befüllt wird
let frameGroupSeq = 0;      // fortlaufende ID je Frames-Layout (verbindet die Insets)
// Hält alle Insets einer Frames-Gruppe gleich groß: ändert sich eines, ziehen
// die anderen in derselben Gruppe proportional mit.
function syncFrameGroupInsets(p) {
  if (!p || p.role !== 'inset' || !p.frameGroup) return;
  photos.forEach(o => {
    if (o !== p && o.role === 'inset' && o.frameGroup === p.frameGroup) { o.w = p.w; o.h = p.h; }
  });
}

// ═══════════════════════════════════════
// RENDER-SCHEDULER (Punkt 1)
// ═══════════════════════════════════════
// redraw() wird bei JEDER Maus-/Touch-Bewegung aufgerufen und zeichnet die
// gesamte Leinwand neu. Statt das pro Event sofort zu tun, koalieren wir auf
// einen requestAnimationFrame: pro Bildschirm-Frame wird maximal einmal
// gezeichnet. renderNow() enthält die eigentliche Zeichenlogik.
let _rafPending = false;
function redraw() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; renderNow(); });
}

// ═══════════════════════════════════════
// VORSCHAU-BITMAPS (Punkt 2)
// ═══════════════════════════════════════
// Auf dem Bildschirm zeichnen wir nicht aus dem (evtl. 6000 px großen)
// Originalbild, sondern aus einer einmalig herunterskalierten Kopie. Das
// teure Hochwertig-Resampling pro Frame wird damit deutlich billiger. Der
// EXPORT nutzt weiterhin das Original (p.img) in voller Auflösung.
const SCREEN_MAX = 2048;
function buildScreenCanvas(img) {
  const nw = img.naturalWidth, nh = img.naturalHeight;
  const scale = Math.min(1, SCREEN_MAX / Math.max(nw, nh));
  if (scale >= 1) return img; // schon klein genug → Original direkt verwenden
  const c = document.createElement('canvas');
  c.width  = Math.max(1, Math.round(nw * scale));
  c.height = Math.max(1, Math.round(nh * scale));
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = true;
  cx.imageSmoothingQuality = 'high';
  cx.drawImage(img, 0, 0, c.width, c.height);
  return c;
}
function srcW(s) { return s.naturalWidth  || s.width; }
function srcH(s) { return s.naturalHeight || s.height; }

// ═══════════════════════════════════════
// UNDO / REDO (Punkt 5)
// ═══════════════════════════════════════
// Schnappschüsse des bearbeitbaren Zustands. Bild-/Vorschau-Objekte werden per
// Referenz geteilt (nicht kopiert) — nur die leichten Metadaten werden tief
// geklont, damit verschachtelte Objekte (crop/frame/split) sich nicht
// gegenseitig überschreiben.
let undoStack = [], redoStack = [];
const UNDO_LIMIT = 60;
function clonePhoto(p) {
  return { ...p,
    crop:  p.crop  ? { ...p.crop }  : p.crop,
    frame: p.frame ? { ...p.frame } : p.frame,
    split: p.split ? { ...p.split } : p.split };
}
function snapshot() {
  return {
    mode, W, H, sel, activeSlide,
    slides: slides.map(s => ({ ...s })),
    photos: photos.map(clonePhoto)
  };
}
function applySnapshot(st) {
  mode = st.mode; W = st.W; H = st.H;
  slides = st.slides.map(s => ({ ...s }));
  photos = st.photos.map(clonePhoto);
  sel = Math.min(st.sel, photos.length - 1);
  activeSlide = Math.min(st.activeSlide, slides.length - 1);
  computeScale();
  resizeCanvas();
  syncModeButtons(); updateSplitButtonLabels(); syncBgButtons();
  updateDots(); updateDeleteBtn(); syncFrameButtons(); syncTextUI(); syncSlotUI();
  redraw();
}
// Vor jeder zustandsändernden Aktion aufrufen. Kontinuierliche Aktionen
// (Ziehen, Mausrad, Pfeiltasten) werden über ein "tag" zusammengefasst, damit
// nicht hunderte Mini-Schritte im Verlauf landen.
let _coTag = null, _coTime = 0;
function beginAction(tag) {
  if (tag) {
    const now = Date.now();
    if (tag === _coTag && now - _coTime < 900) { _coTime = now; scheduleSave(); return; }
    _coTag = tag; _coTime = now;
  } else {
    _coTag = null;
  }
  undoStack.push(snapshot());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = [];
  syncUndoButtons();
  scheduleSave();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  applySnapshot(undoStack.pop());
  _coTag = null; syncUndoButtons(); scheduleSave();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  applySnapshot(redoStack.pop());
  _coTag = null; syncUndoButtons(); scheduleSave();
}
function syncUndoButtons() {
  const u = document.getElementById('undoBtn'), r = document.getElementById('redoBtn');
  if (u) u.disabled = undoStack.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}

// ═══════════════════════════════════════
// AUTO-SAVE via IndexedDB (Punkt 6)
// ═══════════════════════════════════════
// Bilder sind zu groß für localStorage (~5 MB Limit), daher IndexedDB. Wir
// speichern den Zustand inkl. Bild-DataURLs entprellt und stellen ihn beim
// nächsten Laden wieder her. Schlägt IndexedDB fehl (z. B. privater Modus),
// passiert still nichts.
const DB_NAME = 'postfolio', DB_STORE = 'state', DB_KEY = 'current';
function idbOpen() {
  return new Promise((res, rej) => {
    let req;
    try { req = indexedDB.open(DB_NAME, 1); } catch (e) { return rej(e); }
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function idbSet(val) {
  try {
    const db = await idbOpen();
    await new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(val, DB_KEY);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
    db.close();
  } catch (e) { /* still ignorieren */ }
}
async function idbGet() {
  try {
    const db = await idbOpen();
    const val = await new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const r = tx.objectStore(DB_STORE).get(DB_KEY);
      r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error);
    });
    db.close();
    return val;
  } catch (e) { return null; }
}
function serializeState() {
  return {
    mode, activeSlide,
    slides: slides.map(s => ({ ...s })),
    photos: photos.map(p => {
      const o = { ...p };
      delete o.img; delete o.screen;       // Laufzeit-Objekte nicht speichern
      if (p.kind !== 'text' && p.img) o.src = p.img.src; // DataURL ist persistierbar
      return o;
    })
  };
}
let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => idbSet(serializeState()), 700);
}
async function loadSaved() {
  const st = await idbGet();
  if (!st || !Array.isArray(st.photos)) return false;
  mode = MODES[st.mode] ? st.mode : 'post';
  W = MODES[mode].w; H = MODES[mode].h;
  slides = (st.slides && st.slides.length ? st.slides : [{ bg: '#F4F1EB' }]).map(s => ({ ...s }));
  activeSlide = Math.min(st.activeSlide || 0, slides.length - 1);
  // Bilder asynchron aus den gespeicherten DataURLs wiederherstellen.
  await Promise.all(st.photos.map(p => new Promise(resolve => {
    if (p.kind === 'text' || !p.src) return resolve();
    const im = new Image();
    im.onload  = () => { p.img = im; p.screen = buildScreenCanvas(im); resolve(); };
    im.onerror = () => resolve();
    im.src = p.src;
  })));
  // Fotos ohne gültiges Bild verwerfen, src-Feld entfernen.
  photos = st.photos
    .filter(p => p.kind === 'text' || p.kind === 'logo' || p.kind === 'placeholder' || p.img)
    .map(p => { const o = { ...p }; delete o.src; return o; });
  sel = -1;
  return true;
}

// ═══════════════════════════════════════
// CANVAS SIZE
// ═══════════════════════════════════════

// iOS Safari (und mobile Browser generell) begrenzen Canvas-Backing-Stores:
// grob max. ~4096 px je Kante bzw. ~16 MP Fläche auf älteren Geräten. Da WIR
// ALLE Slides nebeneinander auf EINE Leinwand zeichnen (Breite = n·W·S), kann
// ein langes Karussell dieses Limit reißen → die Leinwand bleibt komplett
// weiß. Deshalb begrenzen wir die *Render-Auflösung* (effektives DPR) dynamisch,
// sodass der Backing-Store im sicheren Bereich bleibt. Die CSS-Darstellungsgröße
// (DSCALE) bleibt unverändert — nur die Pixel-Dichte sinkt minimal bei sehr
// vielen Slides. Der Export ist davon NICHT betroffen (eigene Leinwand, eine
// Slide, EX=3 → 3240×4050, klar unter dem Limit).
const MAX_CANVAS_DIM  = 4096;
const MAX_CANVAS_AREA  = 16e6;
function resizeCanvas() {
  const n = slides.length;
  const cssW = n * W * DSCALE, cssH = H * DSCALE; // Darstellungsgröße in CSS-px
  let rdpr = DPR;
  // Kantenlimit
  rdpr = Math.min(rdpr, MAX_CANVAS_DIM / cssW, MAX_CANVAS_DIM / cssH);
  // Flächenlimit
  rdpr = Math.min(rdpr, Math.sqrt(MAX_CANVAS_AREA / (cssW * cssH)));
  // nie unter eine vernünftige Mindestschärfe fallen
  rdpr = Math.max(0.75, rdpr);
  S = DSCALE * rdpr; // Zeichen-Einheiten je logischer Einheit (Backing-Store)

  canvas.width        = Math.round(n * W * S);
  canvas.height       = Math.round(H * S);
  canvas.style.width  = Math.round(cssW) + 'px';
  canvas.style.height = Math.round(cssH) + 'px';
}

// ═══════════════════════════════════════
// ZOOM (overview vs. detail)
// ═══════════════════════════════════════

function setZoom(z) {
  // Keep the slide currently centered in view roughly centered after the
  // resize, instead of jumping back to scroll position 0.
  const prevDSCALE   = DSCALE;
  const centerLogical = (wrap.scrollLeft + wrap.clientWidth / 2) / prevDSCALE;

  zoom   = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
  DSCALE = BASE_DSCALE * zoom;
  S      = DSCALE * DPR;

  resizeCanvas();
  redraw();
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  wrap.scrollLeft = centerLogical * DSCALE - wrap.clientWidth / 2;
}

// Neu einpassen (Skalierung) OHNE die aktuell betrachtete Slide aus dem Blick
// zu verlieren — hält die horizontale Position, damit bei Aktionen (Löschen,
// Panel auf/zu, Drehen des Geräts) nicht zur ersten Slide gesprungen wird.
function relayout() {
  const prev = DSCALE || 1;
  const centerLogical = (wrap.scrollLeft + wrap.clientWidth / 2) / prev;
  computeScale();
  resizeCanvas();
  redraw();
  wrap.scrollLeft = centerLogical * DSCALE - wrap.clientWidth / 2;
}

// ═══════════════════════════════════════
// FORMAT SWITCH (Post 4:5 / Story 9:16)
// ═══════════════════════════════════════
// Switching format changes the base slide size for every aspect-ratio
// dependent calculation in the app (crop split ratios, canvas scale, smart
// guides, export). Existing photos/slides don't translate sensibly across
// such a different shape (e.g. a 3-row split computed for 4:5 is wrong for
// 9:16), so switching clears the canvas — with a confirmation if there's
// anything to lose.

function hasContent() {
  return photos.length > 0 || slides.length > 1 || slides[0].bg !== '#F4F1EB';
}

function setMode(key) {
  if (key === mode || !MODES[key]) return;
  if (hasContent()) {
    const ok = window.confirm('Switching format clears the current canvas (photos & slides). Continue?');
    if (!ok) return;
  }
  beginAction(); // Format-Wechsel ist per Undo umkehrbar
  mode = key;
  W = MODES[key].w; H = MODES[key].h;
  slides = [{ bg: '#F4F1EB' }];
  photos = [];
  sel = -1; activeSlide = 0; guides = [];

  zoom = 1;
  computeScale();
  document.getElementById('zoomLabel').textContent = '100%';
  resizeCanvas();
  syncModeButtons();
  updateSplitButtonLabels();
  syncBgButtons();
  updateDots();
  updateDeleteBtn();
  redraw();
  scheduleSave();
}

function syncModeButtons() {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('sel', b.dataset.mode === mode));
  const ft = document.getElementById('formatToggle');
  if (ft) ft.textContent = (mode === 'post' ? 'Post' : 'Story') + ' ▾';
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setMode(btn.dataset.mode);
    document.getElementById('formatMenu').classList.remove('show');
  });
});

// Positioniert ein fixed-Menü direkt unter seinem Toggle-Button (damit es nicht
// von der horizontal scrollenden Toolbar abgeschnitten wird).
function positionMenu(menu, toggle) {
  const r = toggle.getBoundingClientRect();
  // Breite messen (auch wenn noch unsichtbar), damit das Menü nicht rechts aus
  // dem Bildschirm läuft.
  const prevDisp = menu.style.display;
  menu.style.visibility = 'hidden'; menu.style.display = 'block';
  const mw = menu.offsetWidth || 200;
  menu.style.display = prevDisp; menu.style.visibility = '';
  const margin = 8;
  let left = Math.min(r.left, window.innerWidth - mw - margin);
  if (left < margin) left = margin;
  menu.style.left = Math.round(left) + 'px';
  menu.style.top  = Math.round(r.bottom + 6) + 'px';
}

// Format-Klappmenü öffnen/schließen
document.getElementById('formatToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  const menu = document.getElementById('formatMenu');
  if (!menu.classList.contains('show')) positionMenu(menu, e.currentTarget);
  menu.classList.toggle('show');
});
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('formatWrap'), menu = document.getElementById('formatMenu');
  if (wrap && !wrap.contains(e.target) && !menu.contains(e.target)) menu.classList.remove('show');
});

// A row of n stacked photos (or n side-by-side columns) needs this single-
// photo aspect ratio to exactly fill its slide-relative cell — derived from
// the ACTIVE format's W/H, so it adapts automatically between Post and Story
// instead of being hardcoded to one shape.
function splitRatio(axis, n) {
  return axis === 'row' ? n * (W / H) : (W / H) / n;
}

// Keeps each split-preset button's label showing the LIVE ratio for the
// current format, so it's never stale after switching Post ↔ Story.
function updateSplitButtonLabels() {
  // Nur die Anzahl anzeigen — ob Reihen oder Spalten, sagt die Gruppen-
  // Überschrift. Das hält die Buttons aufgeräumt (keine kryptischen Ratios).
  document.querySelectorAll('.ratio-btn[data-axis]').forEach(btn => {
    btn.textContent = btn.dataset.n;
  });
  updateFormatPresets();
}

// Die klassische „Format"-Reihe (Seitenverhältnisse) passt sich dem aktiven
// App-Format an: in Story 9:16 ist das native Hochformat 9:16, die Alternativen
// sind entsprechend gewählt. „Free" und „Full" (Slide-eigenes Verhältnis)
// bleiben unverändert; nur die fünf mittleren Verhältnis-Buttons wechseln.
const FORMAT_PRESETS = {
  post:  [['1', '1:1'], ['0.8', '4:5'], ['1.25', '5:4'], ['0.6667', '2:3'], ['1.5', '3:2']],
  story: [['1', '1:1'], ['0.5625', '9:16'], ['0.8', '4:5'], ['0.6667', '2:3'], ['0.75', '3:4']]
};
function updateFormatPresets() {
  const set = FORMAT_PRESETS[mode] || FORMAT_PRESETS.post;
  let k = 0;
  document.querySelectorAll('#crop-presets .preset-group .ratio-btn[data-ratio]').forEach(b => {
    const r = b.dataset.ratio;
    if (r === 'free' || r === 'canvas') return;   // bleiben fest
    if (k < set.length) { b.dataset.ratio = set[k][0]; b.textContent = set[k][1]; k++; }
  });
}
