function updateDeleteBtn() {
  const hasSel = sel >= 0 && sel < photos.length;
  const isText = hasSel && photos[sel].kind === 'text';
  const isImage = hasSel && photos[sel].kind === 'image'; // Frame/Crop nur für echte Fotos
  const delBtn = document.getElementById('deleteBtn');
  delBtn.classList.toggle('show', hasSel);
  delBtn.title = isText ? 'Delete text' : 'Delete photo';
  document.getElementById('cropBtn').classList.toggle('show', isImage);
  document.getElementById('layerCtrl').style.display = hasSel ? 'flex' : 'none';
  document.getElementById('frameCtrl').style.display = isImage ? 'flex' : 'none';
  const sheet = document.getElementById('contextSheet');
  sheet.classList.toggle('show', hasSel);
  syncFrameButtons();
  syncSlotUI();
  syncTextUI();
  // Leinwand-Rahmen über dem Panel verkleinern, damit die Slide vollständig und
  // zentriert sichtbar bleibt (mit Sicherheitsrand). Nach dem Layout messen.
  requestAnimationFrame(() => {
    const reserve = hasSel ? sheet.offsetHeight : 0;
    wrap.style.marginBottom = (reserve ? reserve + 12 : 0) + 'px';
    // Zoom-Lupe über das Panel heben, damit sie immer rechts unten sichtbar bleibt.
    document.getElementById('zoomCtrl').style.bottom = (reserve ? reserve + 14 : 14) + 'px';
    relayout();
  });
}

function deleteSelected() {
  if (sel < 0 || sel >= photos.length) return;
  beginAction();
  photos.splice(sel, 1);
  sel = -1;
  updateDeleteBtn();
  redraw();
  scheduleSave();
}
document.getElementById('deleteBtn').addEventListener('click', deleteSelected);

// ── Layer ordering ──────────────────────────────────
document.getElementById('layerUp').addEventListener('click', () => {
  if (sel < 0 || sel >= photos.length - 1) return;
  beginAction();
  [photos[sel], photos[sel+1]] = [photos[sel+1], photos[sel]];
  sel++;
  redraw();
  scheduleSave();
});

document.getElementById('layerDown').addEventListener('click', () => {
  if (sel <= 0) return;
  beginAction();
  [photos[sel], photos[sel-1]] = [photos[sel-1], photos[sel]];
  sel--;
  redraw();
  scheduleSave();
});

document.getElementById('layerFront').addEventListener('click', () => {
  if (sel < 0 || sel >= photos.length - 1) return;
  beginAction();
  const [p] = photos.splice(sel, 1);
  photos.push(p);
  sel = photos.length - 1;
  redraw();
  scheduleSave();
});

document.getElementById('layerBack').addEventListener('click', () => {
  if (sel <= 0) return;
  beginAction();
  const [p] = photos.splice(sel, 1);
  photos.unshift(p);
  sel = 0;
  redraw();
  scheduleSave();
});

// ═══════════════════════════════════════
// FRAME (mat border) + FIT
// ═══════════════════════════════════════

// Widths in logical px at the 1080-wide base canvas (W is the same in both
// Post and Story, only H differs) — a clean white mat, like a gallery print
// mount. Three sizes: subtle, balanced, bold.
// 5-stufige Skala: Stufe 1 (sehr dünn) bis 5 (dick). Logische px bei 1080er
// Breite. Stufen so gewählt, dass zwischen der alten S(8) und M(30) sowie
// zwischen M(30) und L(52) je eine Zwischenstufe liegt.
const FRAME_PRESETS = { none: 0, s1: 8, s2: 18, s3: 30, s4: 40, s5: 52 };
const FRAME_COLOR   = '#ffffff';

// Wendet eine Rahmenbreite (+Farbe) auf EIN Foto an. Gefittete Split-Fotos
// werden neu in ihre Zelle eingepasst (exakte, halbierte Nähte). Frei
// platzierte Fotos behalten ihre Außenkontur (Foto + Rahmen), die Bildgröße
// wächst/schrumpft um die Randdifferenz — Position/Drehung bleiben.
function applyFrameToPhoto(p, newFw, color) {
  if (!p || p.kind !== 'image') return;
  const oldFw = (p.frame && p.frame.width) || 0;
  p.frame = newFw > 0 ? { width: newFw, color: color || (p.frame && p.frame.color) || FRAME_COLOR } : null;

  const { axis, n } = getPhotoSplit(p);
  if (p.fitted && axis && n > 1) {
    fitPhoto(p);
    return;
  }
  const delta = oldFw - newFw;
  if (delta !== 0) {
    const newW = Math.max(20, p.w + 2 * delta);
    const newH = Math.max(20, p.h + 2 * delta);
    if (newW <= p.w && newH <= p.h) {
      const newAspect = newW / newH;
      const c = p.crop || { x: 0, y: 0, w: 1, h: 1 };
      const curAspect = (c.w * p.img.naturalWidth) / (c.h * p.img.naturalHeight);
      if (Math.abs(curAspect - newAspect) > 0.001) p.crop = adjustCropToAspect(p, newAspect);
    }
    p.w = newW; p.h = newH;
  }
}

document.querySelectorAll('.frame-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (sel < 0 || sel >= photos.length || photos[sel].kind === 'text') return;
    beginAction();
    const p = photos[sel];
    const color = (p.frame && p.frame.color) || FRAME_COLOR;
    applyFrameToPhoto(p, FRAME_PRESETS[btn.dataset.frame], color);
    syncFrameButtons();
    redraw();
    scheduleSave();
  });
});

// "Alle": aktuellen Rahmen (Breite + Farbe des gewählten Fotos – sonst Stufe 1
// / Weiß) in einem Schritt auf JEDES Foto anwenden. Ideal, um mehrere
// gestapelte Fotos gemeinsam mit demselben dünnen Rahmen zu versehen.
document.getElementById('frameAllBtn').addEventListener('click', () => {
  const imgs = photos.filter(p => p.kind !== 'text');
  if (imgs.length === 0) return;
  beginAction();
  const selP  = (sel >= 0 && photos[sel] && photos[sel].kind !== 'text') ? photos[sel] : null;
  const fw    = selP && selP.frame ? selP.frame.width : FRAME_PRESETS.s1;
  const color = selP && selP.frame ? selP.frame.color : FRAME_COLOR;
  imgs.forEach(p => applyFrameToPhoto(p, fw, color));
  syncFrameButtons();
  redraw();
  scheduleSave();
});

function syncFrameButtons() {
  const p = (sel >= 0 && sel < photos.length) ? photos[sel] : null;
  const w = p && p.frame ? p.frame.width : 0;
  let key = 'none';
  for (const [k, val] of Object.entries(FRAME_PRESETS)) { if (val === w) key = k; }
  document.querySelectorAll('.frame-btn').forEach(b => b.classList.toggle('sel', b.dataset.frame === key));

  document.getElementById('frameColorCtrl').style.display = (w > 0) ? 'flex' : 'none';
  syncFrameColorButtons();
}

function syncFrameColorButtons() {
  const p = (sel >= 0 && sel < photos.length) ? photos[sel] : null;
  const color = (p && p.frame && p.frame.color) ? p.frame.color.toLowerCase() : null;
  document.querySelectorAll('#frameColorCtrl .clr-btn').forEach(b => {
    b.classList.toggle('sel', !!color && b.dataset.frameclr.toLowerCase() === color);
  });
  const hx = document.getElementById('frameHexInput');
  if (hx && document.activeElement !== hx) hx.value = color || '';
}

// Normalisiert eine Hex-Eingabe (#abc, abc, #aabbcc) → "#aabbcc" oder null.
function normHex(v) {
  v = (v || '').trim();
  if (!v) return null;
  if (v[0] !== '#') v = '#' + v;
  if (/^#([0-9a-fA-F]{3})$/.test(v)) v = '#' + v.slice(1).split('').map(c => c + c).join('');
  return /^#([0-9a-fA-F]{6})$/.test(v) ? v.toLowerCase() : null;
}

// Hex-Eingabe → Rahmenfarbe des gewählten Fotos
function applyFrameHex() {
  if (sel < 0 || sel >= photos.length) return;
  const p = photos[sel];
  if (!p.frame || !(p.frame.width > 0)) return;
  const hex = normHex(document.getElementById('frameHexInput').value);
  if (!hex) { syncFrameColorButtons(); return; }
  beginAction();
  p.frame.color = hex;
  syncFrameColorButtons();
  redraw();
  scheduleSave();
}
document.getElementById('frameHexInput').addEventListener('change', applyFrameHex);
document.getElementById('frameHexInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); applyFrameHex(); e.target.blur(); } });

document.querySelectorAll('#frameColorCtrl .clr-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (sel < 0 || sel >= photos.length) return;
    const p = photos[sel];
    if (!p.frame || !(p.frame.width > 0)) return;
    beginAction();
    p.frame.color = btn.dataset.frameclr;
    syncFrameColorButtons();
    redraw();
    scheduleSave();
  });
});

// Eyedropper: tap the button to arm "pick" mode, then tap anywhere on the
// selected photo to sample that exact pixel and use it as the frame color.
// Reads straight off the live canvas bitmap, so it picks up the photo
// exactly as currently cropped/filtered — no separate color analysis needed.
let pickingFrameColor = false;
let pickingBgColor    = false; // Pipette für den Slide-Hintergrund
let pickTargetIdx     = -1; // photo index captured when eyedropper is armed —
                             // a stray click landing just outside the photo
                             // (selecting nothing / a different photo) on the
                             // sampling tap should still color THIS frame.

// Beendet beide Pipetten-Modi und räumt die UI-Hervorhebung auf.
function disarmPickers() {
  pickingFrameColor = false;
  pickingBgColor = false;
  pickTargetIdx = -1;
  document.getElementById('frameEyedropBtn').classList.remove('picking');
  document.getElementById('bgEyedropBtn').classList.remove('picking');
  canvas.classList.remove('picking-color');
  hideLoupe();
}

document.getElementById('frameEyedropBtn').addEventListener('click', () => {
  if (sel < 0 || sel >= photos.length || !photos[sel].frame || !(photos[sel].frame.width > 0)) return;
  const arm = !pickingFrameColor;
  disarmPickers();
  pickingFrameColor = arm;
  pickTargetIdx = arm ? sel : -1;
  document.getElementById('frameEyedropBtn').classList.toggle('picking', arm);
  canvas.classList.toggle('picking-color', arm);
});

// Pipette für die Hintergrundfarbe der aktiven Slide.
document.getElementById('bgEyedropBtn').addEventListener('click', () => {
  const arm = !pickingBgColor;
  disarmPickers();
  pickingBgColor = arm;
  document.getElementById('bgEyedropBtn').classList.toggle('picking', arm);
  canvas.classList.toggle('picking-color', arm);
  if (arm) document.getElementById('bgMenu').classList.remove('show'); // Menü schließen, damit man die Leinwand antippen kann
});

// Farbe an einer Bildschirmposition aus der Live-Leinwand picken. Wird von
// mousedown/touchstart (für sofortige Reaktion auf Touch) und vom Klick
// aufgerufen. Beendet danach den Pipetten-Modus.
// Liest die Farbe eines Pixels aus der Live-Leinwand (oder null außerhalb).
function sampleCanvasColor(clientX, clientY) {
  const { lx, ly } = clientToLogical(clientX, clientY);
  const px = Math.round(lx * S), py = Math.round(ly * S);
  if (px < 0 || py < 0 || px >= canvas.width || py >= canvas.height) return null;
  try {
    const data = ctx.getImageData(px, py, 1, 1).data;
    return '#' + [data[0], data[1], data[2]].map(v => v.toString(16).padStart(2, '0')).join('');
  } catch (err) { return null; } // Canvas tainted (sollte nicht passieren)
}

// Pipette: Rahmenfarbe des Zielfotos setzen.
function pickColorAt(clientX, clientY) {
  const targetIdx = pickTargetIdx;
  disarmPickers();
  if (targetIdx < 0 || targetIdx >= photos.length || !photos[targetIdx].frame) return;
  const hex = sampleCanvasColor(clientX, clientY);
  if (!hex) return;
  beginAction();
  photos[targetIdx].frame.color = hex;
  if (sel === targetIdx) syncFrameColorButtons();
  redraw();
  scheduleSave();
}

// Pipette: Hintergrundfarbe der aktiven Slide setzen.
function pickBgColorAt(clientX, clientY) {
  disarmPickers();
  const hex = sampleCanvasColor(clientX, clientY);
  if (!hex) return;
  beginAction();
  slides[activeSlide].bg = hex;
  syncBgButtons();
  redraw();
  scheduleSave();
}

// ── Farb-Lupe (Pixel-Zoom + Fadenkreuz beim Pipettieren) ──
let pickXY = null; // letzte Pick-Position (Touch: erst beim Loslassen picken)
const LOUPE_SRC = 15; // wie viele Quellpixel die Lupe zeigt (ungerade → echte Mitte)
function hideLoupe() { document.getElementById('loupe').classList.remove('show'); }
function updateLoupe(clientX, clientY) {
  const lp = document.getElementById('loupe');
  const lcan = document.getElementById('loupeCanvas');
  const r = canvas.getBoundingClientRect();
  const cx = Math.round((clientX - r.left) / DSCALE * S);
  const cy = Math.round((clientY - r.top)  / DSCALE * S);
  if (cx < 0 || cy < 0 || cx >= canvas.width || cy >= canvas.height) { hideLoupe(); return; }
  const lctx = lcan.getContext('2d');
  const D = lcan.width;            // 96
  const half = Math.floor(LOUPE_SRC / 2);
  lctx.imageSmoothingEnabled = false;
  lctx.clearRect(0, 0, D, D);
  lctx.drawImage(canvas, cx - half, cy - half, LOUPE_SRC, LOUPE_SRC, 0, 0, D, D);
  // Markierung des Zielpixels in der Mitte
  const cell = D / LOUPE_SRC;
  lctx.lineWidth = 1; lctx.strokeStyle = 'rgba(0,0,0,0.5)';
  lctx.strokeRect(Math.round(D/2 - cell/2) + 0.5, Math.round(D/2 - cell/2) + 0.5, Math.round(cell), Math.round(cell));
  // kleines + Fadenkreuz
  lctx.strokeStyle = 'rgba(255,255,255,0.95)'; lctx.lineWidth = 1.5;
  lctx.beginPath();
  lctx.moveTo(D/2 - 7, D/2); lctx.lineTo(D/2 + 7, D/2);
  lctx.moveTo(D/2, D/2 - 7); lctx.lineTo(D/2, D/2 + 7);
  lctx.stroke();
  // Mittelfarbe → Rahmen + Hex-Anzeige
  let hex = '#ffffff';
  try { const d = ctx.getImageData(cx, cy, 1, 1).data; hex = '#' + [d[0],d[1],d[2]].map(v => v.toString(16).padStart(2,'0')).join(''); } catch (e) {}
  lcan.style.borderColor = hex;
  document.getElementById('loupeHex').textContent = hex;
  // Lupe über dem Finger/Cursor platzieren (im Sichtbereich halten)
  let left = clientX - D / 2;
  let top  = clientY - D - 34;
  left = Math.max(6, Math.min(window.innerWidth - D - 6, left));
  if (top < 6) top = clientY + 28;
  lp.style.left = left + 'px';
  lp.style.top  = top + 'px';
  lp.classList.add('show');
}
function doPick(clientX, clientY) {
  if (pickingFrameColor) pickColorAt(clientX, clientY);
  else if (pickingBgColor) pickBgColorAt(clientX, clientY);
  hideLoupe();
}

canvas.addEventListener('click', e => {
  if (pickingFrameColor || pickingBgColor) doPick(e.clientX, e.clientY);
});
// Desktop-Hover: Lupe folgt dem Cursor solange die Pipette aktiv ist.
canvas.addEventListener('mousemove', e => {
  if (pickingFrameColor || pickingBgColor) updateLoupe(e.clientX, e.clientY);
});

// A photo's row/column split is recorded explicitly (p.split) the moment a
// Landscape Span / Side-by-Side crop preset is applied — NOT re-derived from
// the crop's aspect ratio. Re-deriving from aspect was the root cause of a
// bug: Fit tightens the crop slightly to match the frame-adjusted cell
// aspect, which shifts it just enough that an aspect-based re-check no
// longer recognizes the group, silently falling back to whole-slide
// placement (every photo in the group then jumps to the same spot).
function getPhotoSplit(p) {
  return p.split || { axis: null, n: 1 };
}

// Per-side frame thickness for a photo. Split-group members (stacked rows /
// side-by-side columns) get HALF the nominal width on the side(s) that face
// a neighboring photo in the same group, and the FULL width on the side(s)
// that face the slide's outer edge — so two abutting frames sum back to the
// same visual thickness as a single outer margin. Without this, internal
// seams between stacked photos looked twice as thick as the outer margins.
function frameInsets(p) {
  const fw = (p.frame && p.frame.width) || 0;
  if (!fw) return { top: 0, right: 0, bottom: 0, left: 0 };
  const { axis, n } = getPhotoSplit(p);
  // Halbierte Naht NUR, wenn das Foto exakt in seine Zelle gefittet ist
  // (p.fitted === true). Sobald es frei verschoben/skaliert/gedreht wurde
  // (p.fitted === false), bekommt jedes Foto auf allen vier Seiten denselben
  // Rand — so wirken die Rahmen auch bei freier Anordnung einheitlich.
  // Beim Drücken von „Fit" wird p.fitted wieder gesetzt, dann greift die
  // Halbierung zwischen gestapelten Fotos erneut.
  if (p.fitted && axis === 'row' && n > 1) {
    const slot = Math.max(0, Math.min(n - 1, p.slot ?? 0));
    return { top: slot === 0 ? fw : fw / 2, bottom: slot === n - 1 ? fw : fw / 2, left: fw, right: fw };
  }
  if (p.fitted && axis === 'col' && n > 1) {
    const slot = Math.max(0, Math.min(n - 1, p.slot ?? 0));
    return { left: slot === 0 ? fw : fw / 2, right: slot === n - 1 ? fw : fw / 2, top: fw, bottom: fw };
  }
  return { top: fw, right: fw, bottom: fw, left: fw };
}

function slideIndexOf(p) {
  return Math.max(0, Math.min(slides.length - 1, Math.round((p.cx - W / 2) / W)));
}

// After cropping a photo to a row/column split ratio, auto-pick the first
// row/column on its slide that isn't already taken by another matching photo —
// instead of always defaulting back to slot 0 (top / left).
function autoAssignSlot(p) {
  const { axis, n } = getPhotoSplit(p);
  if (!axis) return;
  const slideIdx = slideIndexOf(p);
  const occupied = new Set();
  photos.forEach(other => {
    if (other === p) return;
    if (slideIndexOf(other) !== slideIdx) return;
    const split2 = getPhotoSplit(other);
    if (split2.axis === axis && split2.n === n) {
      occupied.add(Math.max(0, Math.min(n - 1, other.slot ?? 0)));
    }
  });
  let slot = 0;
  while (slot < n && occupied.has(slot)) slot++;
  p.slot = slot < n ? slot : 0;
}

// Tightens a photo's crop (never widens it) so its displayed aspect exactly
// matches targetAspect — keeps the same crop center, trims the long side.
function adjustCropToAspect(p, targetAspect) {
  const c  = p.crop || { x: 0, y: 0, w: 1, h: 1 };
  const nw = p.img.naturalWidth, nh = p.img.naturalHeight;
  const curW = c.w * nw, curH = c.h * nh;
  const curAspect = curW / curH;
  let newW, newH;
  if (curAspect > targetAspect) { newH = curH; newW = newH * targetAspect; }
  else                           { newW = curW; newH = newW / targetAspect; }
  const cx = c.x * nw + curW / 2;
  const cy = c.y * nh + curH / 2;
  let nx = Math.max(0, Math.min(nw - newW, cx - newW / 2));
  let ny = Math.max(0, Math.min(nh - newH, cy - newH / 2));
  return { x: nx / nw, y: ny / nh, w: newW / nw, h: newH / nh };
}

// Position stepper — picks which row (Landscape Span) or column (Side-by-Side)
// of the current slide the selected photo's Fit should target.
function syncSlotUI() {
  const ctrl = document.getElementById('slotCtrl');
  if (sel < 0 || sel >= photos.length) { ctrl.style.display = 'none'; return; }
  const p = photos[sel];
  const { n } = getPhotoSplit(p);
  if (n <= 1) { ctrl.style.display = 'none'; return; }
  ctrl.style.display = 'flex';
  if (p.slot == null) p.slot = 0;
  p.slot = Math.max(0, Math.min(n - 1, p.slot));
  document.getElementById('slotLabel').textContent = `${p.slot + 1}/${n}`;
}

// Moves a photo to an adjacent row/column slot (dir = -1 up/left, +1 down/
// right) and SWAPS it with whichever other photo already occupies that
// slot in the same split group on the same slide — instead of just changing
// a number that could collide with another photo's slot (causing both to
// land on top of each other). Both photos are immediately re-fit so the
// swap is visible right away, with no need to press Fit manually.
function swapSlot(p, dir) {
  if (p.kind === 'text') return;
  const { axis, n } = getPhotoSplit(p);
  if (n <= 1) return;
  const slideIdx  = slideIndexOf(p);
  const curSlot   = p.slot ?? 0;
  const targetSlot = ((curSlot + dir) % n + n) % n;

  const other = photos.find(o => {
    if (o === p) return false;
    if (slideIndexOf(o) !== slideIdx) return false;
    const os = getPhotoSplit(o);
    return os.axis === axis && os.n === n && (o.slot ?? 0) === targetSlot;
  });

  p.slot = targetSlot;
  if (other) other.slot = curSlot;

  fitPhoto(p);
  if (other) fitPhoto(other);
}

document.getElementById('slotUp').addEventListener('click', () => {
  if (sel < 0 || sel >= photos.length) return;
  beginAction();
  swapSlot(photos[sel], -1);
  syncSlotUI();
  redraw();
  scheduleSave();
});

document.getElementById('slotDown').addEventListener('click', () => {
  if (sel < 0 || sel >= photos.length) return;
  beginAction();
  swapSlot(photos[sel], 1);
  syncSlotUI();
  redraw();
  scheduleSave();
});

// Instantly scales, un-rotates, and centers a photo so it perfectly fills its
// cell — the whole slide by default, or just its row/column (per the
// Position stepper) when the crop ratio implies a split, minus the frame
// margin if one is set.
function fitPhoto(p) {
  // Foto sitzt jetzt exakt in seiner Zelle → halbierte Naht-Ränder dürfen
  // greifen (siehe frameInsets). Muss VOR dem frameInsets()-Aufruf weiter
  // unten gesetzt werden.
  p.fitted = true;
  const c0 = p.crop || { x: 0, y: 0, w: 1, h: 1 };
  const imgAspect = (c0.w * p.img.naturalWidth) / (c0.h * p.img.naturalHeight);

  // Slide-übergreifendes Breitbild: deckt das Foto (deutlich) mehr als eine
  // Slide ab und ist kein Split, passt Fit es exakt über die betroffenen
  // Slides ein — volle Höhe, sauber an den Slide-Grenzen.
  const _sp = getPhotoSplit(p);
  if (!_sp.axis && slides.length >= 2) {
    // Welche Slides überlappt das Foto aktuell nennenswert (> 25 % Slide-Breite)?
    let start = -1, end = -1;
    for (let i = 0; i < slides.length; i++) {
      const ov = Math.min(p.cx + p.w / 2, (i + 1) * W) - Math.max(p.cx - p.w / 2, i * W);
      if (ov > W * 0.25) { if (start < 0) start = i; end = i; }
    }
    if (start >= 0 && end - start + 1 >= 2) {       // erstreckt sich über ≥ 2 Slides → exakt einpassen
      const spanN = end - start + 1;
      const ins0 = frameInsets(p);                  // ohne Split → rundum gleich
      const iW = Math.max(20, spanN * W - ins0.left - ins0.right);
      const iH = Math.max(20, H - ins0.top - ins0.bottom);
      if (Math.abs(imgAspect - iW / iH) > 0.001) p.crop = adjustCropToAspect(p, iW / iH);
      p.w = iW; p.h = iH; p.rot = 0;
      p.cx = start * W + ins0.left + iW / 2;
      p.cy = ins0.top + iH / 2;
      return;
    }
  }

  const { axis, n } = getPhotoSplit(p);

  const slideIdx = slideIndexOf(p);
  let cellX = slideIdx * W, cellY = 0, cellW = W, cellH = H;

  if (axis === 'row') {
    const slot = Math.max(0, Math.min(n - 1, p.slot ?? 0));
    cellH = H / n;
    cellY = slot * cellH;
  } else if (axis === 'col') {
    const slot = Math.max(0, Math.min(n - 1, p.slot ?? 0));
    cellW = W / n;
    cellX = slideIdx * W + slot * cellW;
  }

  // Per-side insets — halved on seams shared with a neighboring split photo,
  // so the visible margin between stacked photos matches the outer margin.
  const ins = frameInsets(p);

  const innerW = Math.max(20, cellW - ins.left - ins.right);
  const innerH = Math.max(20, cellH - ins.top - ins.bottom);
  const innerAspect = innerW / innerH;

  // Exact-fill both axes — so the frame (image + margin) lands flush with the
  // cell on every side, with the same margin as a single un-split photo.
  // Subtracting the frame insets changes the available aspect slightly, so
  // the crop is tightened (never widened) to match it precisely.
  if (Math.abs(imgAspect - innerAspect) > 0.001) {
    p.crop = adjustCropToAspect(p, innerAspect);
  }
  p.w = innerW; p.h = innerH; p.rot = 0;
  p.cx = cellX + ins.left + innerW / 2;
  p.cy = cellY + ins.top + innerH / 2;
}

function fitSelectedPhoto() {
  if (sel < 0 || sel >= photos.length || photos[sel].kind !== 'image') return;
  beginAction();
  fitPhoto(photos[sel]);
  redraw();
  scheduleSave();
}

document.getElementById('fitBtn').addEventListener('click', fitSelectedPhoto);

// ═══════════════════════════════════════
// CROP
// ═══════════════════════════════════════

let cropOpen  = false;
let cropPhoto = null;
let cropImgW = 0, cropImgH = 0;
let cropRect  = null;   // { x, y, w, h } in crop-canvas px
let cropDrag  = null;   // { mode, startX, startY, startRect }
let lockRatio = null;   // null = free, otherwise target aspect ratio (w / h)
let pendingSplit = null; // { axis, n } once a row/col preset is picked in the crop modal, else null

const cropCanvas = document.getElementById('cropCanvas');
const cropCtx     = cropCanvas.getContext('2d');

document.getElementById('cropBtn').addEventListener('click', openCropOverlay);

function openCropOverlay() {
  if (sel < 0 || sel >= photos.length || photos[sel].kind !== 'image') return;
  cropPhoto = photos[sel];
  updateFormatPresets();   // Seitenverhältnisse passend zum aktiven Format

  const natW = cropPhoto.img.naturalWidth, natH = cropPhoto.img.naturalHeight;
  const stageW = window.innerWidth  * 0.9;
  const stageH = window.innerHeight * 0.7;
  const fit = Math.min(1, stageW / natW, stageH / natH);

  cropImgW = natW * fit;
  cropImgH = natH * fit;
  cropCanvas.width        = cropImgW * DPR;
  cropCanvas.height       = cropImgH * DPR;
  cropCanvas.style.width  = cropImgW + 'px';
  cropCanvas.style.height = cropImgH + 'px';
  cropCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

  const c = cropPhoto.crop || { x: 0, y: 0, w: 1, h: 1 };
  cropRect = { x: c.x * cropImgW, y: c.y * cropImgH, w: c.w * cropImgW, h: c.h * cropImgH };

  // Re-select whichever preset (or Free) matches this photo's current split,
  // so re-opening Crop doesn't silently wipe its row/column assignment.
  const existingSplit = cropPhoto.split || null;
  let matchBtn = null;
  document.querySelectorAll('.ratio-btn').forEach(b => {
    b.classList.remove('sel');
    if (existingSplit && b.dataset.axis === existingSplit.axis && parseInt(b.dataset.n, 10) === existingSplit.n) {
      matchBtn = b;
    }
  });
  if (matchBtn) {
    matchBtn.classList.add('sel');
    lockRatio = splitRatio(existingSplit.axis, existingSplit.n);
  } else {
    document.querySelector('.ratio-btn[data-ratio="free"]').classList.add('sel');
    lockRatio = null;
  }
  pendingSplit = existingSplit;

  cropOpen = true;
  document.getElementById('crop-overlay').classList.add('show');
  drawCropCanvas();
}

function closeCropOverlay() {
  cropOpen  = false;
  cropPhoto = null;
  cropDrag  = null;
  document.getElementById('crop-overlay').classList.remove('show');
}

function getCropHandles(r) {
  const handles = {
    tl: { x: r.x,         y: r.y         }, tr: { x: r.x + r.w, y: r.y         },
    bl: { x: r.x,         y: r.y + r.h   }, br: { x: r.x + r.w, y: r.y + r.h   }
  };
  // With a locked aspect ratio, only corner handles — edge handles would break the ratio
  if (!lockRatio) {
    handles.t = { x: r.x + r.w/2, y: r.y         };
    handles.b = { x: r.x + r.w/2, y: r.y + r.h   };
    handles.l = { x: r.x,         y: r.y + r.h/2 };
    handles.r = { x: r.x + r.w,   y: r.y + r.h/2 };
  }
  return handles;
}

// ── Aspect ratio presets ──
document.querySelectorAll('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    const axis = btn.dataset.axis;
    if (axis) {
      // Row/column split — ratio is derived live from the active format's
      // W/H, so it's automatically correct whether we're in Post or Story.
      const n = parseInt(btn.dataset.n, 10);
      lockRatio = splitRatio(axis, n);
      applyPresetRatio(lockRatio);
      pendingSplit = { axis, n };
    } else {
      const val = btn.dataset.ratio;
      if (val === 'free') {
        lockRatio = null;
      } else if (val === 'canvas') {
        // "Full Slide" — exactly the active format's own aspect ratio.
        lockRatio = W / H;
        applyPresetRatio(lockRatio);
      } else {
        lockRatio = parseFloat(val);
        applyPresetRatio(lockRatio);
      }
      pendingSplit = null;
    }
    drawCropCanvas();
  });
});

function applyPresetRatio(ratio) {
  const cx = cropRect.x + cropRect.w / 2, cy = cropRect.y + cropRect.h / 2;
  let w, h;
  if (cropImgW / cropImgH > ratio) { h = cropImgH; w = h * ratio; }
  else                              { w = cropImgW; h = w / ratio; }
  const x = clampNum(cx - w / 2, 0, cropImgW - w);
  const y = clampNum(cy - h / 2, 0, cropImgH - h);
  cropRect = { x, y, w, h };
}

function drawCropCanvas() {
  cropCtx.clearRect(0, 0, cropImgW, cropImgH);
  cropCtx.drawImage(cropPhoto.img, 0, 0, cropImgW, cropImgH);

  // Dim everything outside the crop rect
  cropCtx.fillStyle = 'rgba(0,0,0,0.6)';
  cropCtx.fillRect(0, 0, cropImgW, cropRect.y);
  cropCtx.fillRect(0, cropRect.y + cropRect.h, cropImgW, cropImgH - cropRect.y - cropRect.h);
  cropCtx.fillRect(0, cropRect.y, cropRect.x, cropRect.h);
  cropCtx.fillRect(cropRect.x + cropRect.w, cropRect.y, cropImgW - cropRect.x - cropRect.w, cropRect.h);

  // Rule-of-thirds guide lines
  cropCtx.strokeStyle = 'rgba(255,255,255,0.45)';
  cropCtx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    const x = cropRect.x + cropRect.w * i / 3;
    cropCtx.beginPath(); cropCtx.moveTo(x, cropRect.y); cropCtx.lineTo(x, cropRect.y + cropRect.h); cropCtx.stroke();
    const y = cropRect.y + cropRect.h * i / 3;
    cropCtx.beginPath(); cropCtx.moveTo(cropRect.x, y); cropCtx.lineTo(cropRect.x + cropRect.w, y); cropCtx.stroke();
  }

  // Crop border
  cropCtx.strokeStyle = '#D10101';
  cropCtx.lineWidth = 2;
  cropCtx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);

  // Handles
  const HS = 10;
  cropCtx.fillStyle = '#D10101';
  Object.values(getCropHandles(cropRect)).forEach(h => {
    cropCtx.fillRect(h.x - HS / 2, h.y - HS / 2, HS, HS);
  });
}

function cropPointer(clientX, clientY) {
  const r = cropCanvas.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

function hitCropHandle(px, py) {
  const HR = 14;
  const handles = getCropHandles(cropRect);
  for (const [mode, h] of Object.entries(handles)) {
    if (Math.hypot(px - h.x, py - h.y) <= HR) return mode;
  }
  return null;
}

function cropPointInRect(px, py) {
  return px >= cropRect.x && px <= cropRect.x + cropRect.w &&
         py >= cropRect.y && py <= cropRect.y + cropRect.h;
}

const CROP_MIN = 30;
function clampNum(v, min, max) { return Math.max(min, Math.min(max, v)); }

function resizeCropRect(mode, dx, dy) {
  const s = cropDrag.startRect;

  // Locked aspect ratio: corner handles only, scaling proportionally from the opposite corner
  if (lockRatio && mode !== 'move') {
    let anchorX, anchorY;
    switch (mode) {
      case 'tl': anchorX = s.x + s.w; anchorY = s.y + s.h; break;
      case 'tr': anchorX = s.x;       anchorY = s.y + s.h; break;
      case 'bl': anchorX = s.x + s.w; anchorY = s.y;       break;
      case 'br': anchorX = s.x;       anchorY = s.y;       break;
      default:   anchorX = s.x;       anchorY = s.y;
    }
    const delta = (mode === 'tl' || mode === 'bl') ? -dx : dx;
    const maxW  = Math.min(cropImgW, cropImgH * lockRatio);
    const newW  = clampNum(s.w + delta, CROP_MIN, maxW);
    const newH  = newW / lockRatio;

    let x = (mode === 'tl' || mode === 'bl') ? anchorX - newW : anchorX;
    let y = (mode === 'tl' || mode === 'tr') ? anchorY - newH : anchorY;
    x = clampNum(x, 0, cropImgW - newW);
    y = clampNum(y, 0, cropImgH - newH);

    cropRect = { x, y, w: newW, h: newH };
    return;
  }

  let r = { ...s };

  switch (mode) {
    case 'move':
      r.x = clampNum(s.x + dx, 0, cropImgW - s.w);
      r.y = clampNum(s.y + dy, 0, cropImgH - s.h);
      break;
    case 'tl':
      r.x = clampNum(s.x + dx, 0, s.x + s.w - CROP_MIN);
      r.y = clampNum(s.y + dy, 0, s.y + s.h - CROP_MIN);
      r.w = s.x + s.w - r.x;
      r.h = s.y + s.h - r.y;
      break;
    case 'tr':
      r.y = clampNum(s.y + dy, 0, s.y + s.h - CROP_MIN);
      r.w = clampNum(s.w + dx, CROP_MIN, cropImgW - s.x);
      r.h = s.y + s.h - r.y;
      break;
    case 'bl':
      r.x = clampNum(s.x + dx, 0, s.x + s.w - CROP_MIN);
      r.w = s.x + s.w - r.x;
      r.h = clampNum(s.h + dy, CROP_MIN, cropImgH - s.y);
      break;
    case 'br':
      r.w = clampNum(s.w + dx, CROP_MIN, cropImgW - s.x);
      r.h = clampNum(s.h + dy, CROP_MIN, cropImgH - s.y);
      break;
    case 't':
      r.y = clampNum(s.y + dy, 0, s.y + s.h - CROP_MIN);
      r.h = s.y + s.h - r.y;
      break;
    case 'b':
      r.h = clampNum(s.h + dy, CROP_MIN, cropImgH - s.y);
      break;
    case 'l':
      r.x = clampNum(s.x + dx, 0, s.x + s.w - CROP_MIN);
      r.w = s.x + s.w - r.x;
      break;
    case 'r':
      r.w = clampNum(s.w + dx, CROP_MIN, cropImgW - s.x);
      break;
  }
  cropRect = r;
}

function cropDragStart(clientX, clientY) {
  const { x, y } = cropPointer(clientX, clientY);
  const handle = hitCropHandle(x, y);
  if (handle) {
    cropDrag = { mode: handle, startX: x, startY: y, startRect: { ...cropRect } };
  } else if (cropPointInRect(x, y)) {
    cropDrag = { mode: 'move', startX: x, startY: y, startRect: { ...cropRect } };
  }
}

function cropDragMove(clientX, clientY) {
  if (!cropDrag) return;
  const { x, y } = cropPointer(clientX, clientY);
  resizeCropRect(cropDrag.mode, x - cropDrag.startX, y - cropDrag.startY);
  drawCropCanvas();
}

function cropDragEnd() { cropDrag = null; }

cropCanvas.addEventListener('mousedown', e => cropDragStart(e.clientX, e.clientY));
window.addEventListener('mousemove', e => { if (cropOpen) cropDragMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   () => { if (cropOpen) cropDragEnd(); });

cropCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  cropDragStart(t.clientX, t.clientY);
}, { passive: false });
cropCanvas.addEventListener('touchmove', e => {
  if (!cropOpen || !cropDrag) return;
  e.preventDefault();
  const t = e.touches[0];
  cropDragMove(t.clientX, t.clientY);
}, { passive: false });
cropCanvas.addEventListener('touchend', () => cropDragEnd());

document.getElementById('cropCancel').addEventListener('click', closeCropOverlay);

document.getElementById('cropApply').addEventListener('click', () => {
  if (!cropPhoto || !cropRect) return;
  beginAction();
  const norm = {
    x: cropRect.x / cropImgW,
    y: cropRect.y / cropImgH,
    w: cropRect.w / cropImgW,
    h: cropRect.h / cropImgH
  };
  cropPhoto.crop = norm;

  // Displayed width stays the same, height adapts to the new crop aspect ratio
  const cropPxW = norm.w * cropPhoto.img.naturalWidth;
  const cropPxH = norm.h * cropPhoto.img.naturalHeight;
  cropPhoto.h = cropPhoto.w * (cropPxH / cropPxW);

  // Persist the chosen split explicitly (set by whichever preset button was
  // clicked) — this is what Fit/slot logic reads, so it survives later crop
  // tightening instead of being silently lost.
  cropPhoto.split = pendingSplit;

  // If this crop matches a row/column split, claim the next free slot on
  // this slide instead of always defaulting back to the first one.
  autoAssignSlot(cropPhoto);

  // A row/column split crop has a fully-defined target cell (slide, axis, n,
  // slot) — snap the photo into it right away instead of leaving it at
  // whatever size/position it happened to have before cropping. Without
  // this, several stacked photos could end up at uneven heights with
  // ragged, inconsistent gaps until each one was individually re-fit by hand.
  if (pendingSplit) {
    fitPhoto(cropPhoto);
  }

  closeCropOverlay();
  syncSlotUI();
  redraw();
  scheduleSave();
});

// ── Export dropdown toggle ──
document.getElementById('exportBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('exportMenu').classList.toggle('show');
});
document.addEventListener('click', () => {
  document.getElementById('exportMenu').classList.remove('show');
});

// ── Export all slides ──
document.getElementById('exportAllBtn').addEventListener('click', () => {
  document.getElementById('exportMenu').classList.remove('show');
  document.getElementById('promoInvite').classList.remove('hidden'); // Einladung bei neuem Export zeigen
  runExport(slides.map((_, i) => i));
});

// ── Export single active slide ──
document.getElementById('exportOneBtn').addEventListener('click', () => {
  document.getElementById('exportMenu').classList.remove('show');
  document.getElementById('promoInvite').classList.remove('hidden');
  runExport([activeSlide]);
});

// ── Outro-Einladung: optionale Marken-Slide anhängen und Export neu erzeugen ──
function addOutroAndReexport(dark) {
  addOutroSlide(dark);
  document.getElementById('promoInvite').classList.add('hidden'); // nicht doppelt anbieten
  runExport(slides.map((_, i) => i));
}
document.getElementById('promoAddLight').addEventListener('click', () => addOutroAndReexport(false));
document.getElementById('promoAddDark').addEventListener('click', () => addOutroAndReexport(true));

let lastExportUrls = []; // [{ url, idx }] from the most recent export, used by "Download All"

async function runExport(slideIndices) {
  const prevSel = sel;
  sel = -1;
  document.getElementById('loading').classList.add('show');

  // Alte Object-URLs des letzten Exports freigeben (Speicher), bevor neue
  // erzeugt werden.
  lastExportUrls.forEach(u => { try { URL.revokeObjectURL(u.url); } catch (e) {} });
  lastExportUrls = [];

  // Kurze Pause, damit der Lade-Overlay sichtbar gerendert wird.
  await new Promise(r => setTimeout(r, 50));

  const urls = [];
  for (const i of slideIndices) {
    const blob = await canvasToBlob(exportSlideCanvas(i));
    urls.push({ url: URL.createObjectURL(blob), blob, idx: i });
  }
  lastExportUrls = urls;
  document.getElementById('loading').classList.remove('show');

  const list = document.getElementById('exp-list');
  list.innerHTML = '';
  urls.forEach(({ url, idx }) => {
    const item = document.createElement('div');
    item.className = 'exp-item';

    const lbl = document.createElement('span');
    lbl.textContent = `Slide ${idx + 1}${slideIndices.length > 1 ? ' / ' + slides.length : ''}`;

    const img = document.createElement('img');
    img.src = url;

    item.appendChild(lbl);
    item.appendChild(img);

    if (!isIOS) {
      const btn = document.createElement('button');
      btn.className = 'dl-btn';
      btn.textContent = '↓ Download';
      btn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = url; a.download = `carousel_${idx + 1}.png`; a.click();
      });
      item.appendChild(btn);
    }

    list.appendChild(item);
  });

  // "Download All" (.zip) only makes sense for non-iOS — iOS Safari
  // doesn't reliably trigger blob-URL file downloads from a script.
  // On iOS, "Save All to Photos" uses the native Web Share sheet
  // instead, which can save multiple images straight into Photos
  // in one tap (no zip/unzip detour needed).
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  const shareAllBtn = document.getElementById('shareAllBtn');
  const canShareFiles = isIOS && typeof navigator.canShare === 'function';
  downloadAllBtn.classList.toggle('show', !isIOS && urls.length > 1);
  shareAllBtn.classList.toggle('show', canShareFiles && urls.length > 1);

  document.getElementById('exp-hint').textContent = isIOS
    ? (canShareFiles ? 'Long-press image → Save Image, or tap "Save All to Photos" below' : 'Long-press image → Save Image')
    : 'Download per slide, or all at once below';

  document.getElementById('exp-overlay').classList.add('show');

  sel = prevSel;
  redraw();
}

// ── Download all exported slides at once, bundled into a single .zip ──
document.getElementById('downloadAllBtn').addEventListener('click', async () => {
  const btn = document.getElementById('downloadAllBtn');
  if (btn.disabled || lastExportUrls.length === 0) return;
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = 'Zipping…';

  try {
    const zip = new JSZip();
    for (const { blob, idx } of lastExportUrls) {
      zip.file(`carousel_${idx + 1}.png`, blob); // Blob liegt schon vor (kein fetch nötig)
    }
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'carousel_slides.zip';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  } catch (err) {
    console.error('Zip download failed:', err);
    alert('Could not create the zip file. Try downloading slides individually instead.');
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
});

// ── Save all exported slides directly to Photos via the native iOS share
// sheet (Web Share API, level 2 file sharing). Sharing multiple images at
// once surfaces a "Save Images" action that drops them straight into
// Photos — no zip/unzip detour needed. ──
document.getElementById('shareAllBtn').addEventListener('click', async () => {
  const btn = document.getElementById('shareAllBtn');
  if (btn.disabled || lastExportUrls.length === 0) return;
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = 'Preparing…';

  try {
    const files = lastExportUrls.map(({ blob, idx }) =>
      new File([blob], `carousel_${idx + 1}.png`, { type: 'image/png' }));
    if (navigator.canShare && navigator.canShare({ files })) {
      await navigator.share({ files });
    } else {
      alert('Saving several images at once isn\'t supported on this device. Long-press each image above and choose "Save Image" instead.');
    }
  } catch (err) {
    if (err.name !== 'AbortError') { // user cancelling the share sheet is not an error
      console.error('Share failed:', err);
      alert('Could not share the images. Try saving them individually instead.');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
});

// Liefert die fertig gezeichnete Export-Leinwand (volle Auflösung, Original-
// bilder). Die Umwandlung in einen Blob passiert asynchron in runExport.
function exportSlideCanvas(i) {
  const ec = document.createElement('canvas');
  ec.width = W * EX; ec.height = H * EX;
  const ectx = ec.getContext('2d');
  ectx.imageSmoothingEnabled = true;
  ectx.imageSmoothingQuality = 'high';

  // Clip to slide bounds
  ectx.save();
  ectx.beginPath();
  ectx.rect(0, 0, W * EX, H * EX);
  ectx.clip();

  // Background
  ectx.fillStyle = slides[i].bg;
  ectx.fillRect(0, 0, W * EX, H * EX);

  // Photos + text items (offset so slide i starts at x=0)
  photos.forEach(p => {
    ectx.save();
    ectx.translate((p.cx - i * W) * EX, p.cy * EX);
    ectx.rotate(p.rot);
    if (p.kind === 'text') {
      drawTextContent(ectx, p, EX);
      ectx.restore();
      return;
    }
    if (p.kind === 'logo') { drawLogoItem(ectx, p, EX); ectx.restore(); return; }
    if (p.kind === 'placeholder') { ectx.restore(); return; } // leere Platzhalter nicht exportieren
    if (p.frame && p.frame.width > 0) {
      const ins = frameInsets(p);
      ectx.fillStyle = p.frame.color;
      ectx.fillRect(-(p.w / 2 + ins.left) * EX, -(p.h / 2 + ins.top) * EX,
                    (p.w + ins.left + ins.right) * EX, (p.h + ins.top + ins.bottom) * EX);
    }
    const c = p.crop || { x: 0, y: 0, w: 1, h: 1 };
    const sx = c.x * p.img.naturalWidth,  sw = c.w * p.img.naturalWidth;
    const sy = c.y * p.img.naturalHeight, sh = c.h * p.img.naturalHeight;
    ectx.drawImage(p.img, sx, sy, sw, sh, -p.w / 2 * EX, -p.h / 2 * EX, p.w * EX, p.h * EX);
    ectx.restore();
  });

  ectx.restore();
  return ec;
}

// canvas.toBlob ist asynchron und speicherschonender als toDataURL
// (kein riesiger Base64-String) — wichtig auf Mobilgeräten bei 3×-PNGs.
function canvasToBlob(c) {
  return new Promise(resolve => c.toBlob(resolve, 'image/png'));
}

document.getElementById('closeExp').addEventListener('click', () => {
  document.getElementById('exp-overlay').classList.remove('show');
  document.getElementById('exp-list').innerHTML = '';
  document.getElementById('downloadAllBtn').classList.remove('show');
  document.getElementById('shareAllBtn').classList.remove('show');
  // Object-URLs freigeben, damit der Speicher der exportierten PNGs frei wird.
  lastExportUrls.forEach(u => { try { URL.revokeObjectURL(u.url); } catch (e) {} });
  lastExportUrls = [];
});

// Update active slide when user scrolls
wrap.addEventListener('scroll', () => {
  const i = Math.round(wrap.scrollLeft / (W * DSCALE));
  if (i !== activeSlide && i >= 0 && i < slides.length) {
    activeSlide = i;
    syncBgButtons();
    updateDots();
  }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('newBtn').addEventListener('click', () => {
  if (hasContent() && !window.confirm('Start a new project? This clears all photos and slides.')) return;
  beginAction(); // leeren ist per Undo umkehrbar
  slides = [{ bg: '#F4F1EB' }];
  photos = []; sel = -1; activeSlide = 0; guides = [];
  resizeCanvas(); syncBgButtons(); updateDots(); updateDeleteBtn();
  syncFrameButtons(); syncTextUI(); syncSlotUI();
  redraw(); scheduleSave();
});

// Beim Start gespeicherten Zustand (IndexedDB) wiederherstellen, sonst der
// Standard-Leerzustand. loadSaved() ist asynchron, weil die Bilder aus ihren
// DataURLs neu dekodiert werden müssen.
// Splash schließen (Einstieg in den Editor)
document.getElementById('splashStart').addEventListener('click', () => {
  document.getElementById('splash').classList.add('hidden');
});

// Browser-eigenes Pinch-Zoom (Safari-Gesten) und Doppeltipp-Zoom unterbinden —
// die App bringt ihren eigenen Zoom mit. So „wackelt" das Fenster nicht.
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive: false }));

// Bei Größen-/Orientierungsänderung neu einpassen.
window.addEventListener('resize', relayout);

(async function init() {
  let restored = false;
  try { restored = await loadSaved(); } catch (e) { /* still: bleibt Standardzustand */ }
  computeScale();   // BASE_DSCALE an evtl. wiederhergestelltes Format (H) anpassen
  resizeCanvas();
  updateDots();
  syncBgButtons();
  syncModeButtons();
  updateSplitButtonLabels();
  syncFrameButtons();
  syncTextUI();
  syncSlotUI();
  updateDeleteBtn();
  syncUndoButtons();
  redraw();
  // Bestehendes Projekt mit Inhalt → direkt in den Editor, Splash überspringen.
  if (restored && photos.length > 0) document.getElementById('splash').classList.add('hidden');
})();
</script>
