// SLIDE DOTS
// ═══════════════════════════════════════

function updateDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === activeSlide ? ' on' : '');
    d.addEventListener('click', () => {
      activeSlide = i;
      syncBgButtons();
      updateDots();
      wrap.scrollLeft = i * W * DSCALE;
      redraw();
    });
    el.appendChild(d);
  });
  document.getElementById('slideCount').textContent = slides.length;
}

// ═══════════════════════════════════════
// COORDINATE HELPERS
// ═══════════════════════════════════════

function clientToLogical(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { lx: (cx - r.left) / DSCALE, ly: (cy - r.top) / DSCALE };
}

const ROT_OFFSET  = 32; // px above photo top (logical)
const HANDLE_R    = 24; // hit radius for rotation handle (logical) — großzügig für Touch

function rotHandlePos(p) {
  const off = p.h / 2 + ROT_OFFSET;
  return {
    hx: p.cx - off * Math.sin(p.rot),  // sin because rotate around center
    hy: p.cy - off * Math.cos(p.rot)
  };
}

function hitRotHandle(p, lx, ly) {
  const { hx, hy } = rotHandlePos(p);
  return Math.hypot(lx - hx, ly - hy) <= HANDLE_R;
}

const CORNER_HANDLE_R = 26; // hit radius for corner resize dots (logical) — generous for touch

// The 4 corner-dot positions in canvas space, accounting for rotation.
function cornerHandlePositions(p) {
  const hw = p.w / 2, hh = p.h / 2;
  const cos = Math.cos(p.rot), sin = Math.sin(p.rot);
  return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([x,y]) => ({
    x: p.cx + (x * cos - y * sin),
    y: p.cy + (x * sin + y * cos)
  }));
}

function hitCornerHandle(p, lx, ly) {
  return cornerHandlePositions(p).some(c => Math.hypot(lx - c.x, ly - c.y) <= CORNER_HANDLE_R);
}

// Lösch-Griff (×) diagonal außerhalb der oberen LINKEN Ecke — gegenüber dem
// Rotations-Griff (oben Mitte), damit sich beide nicht in die Quere kommen.
const DEL_OFFSET = 24; // logische px, diagonal nach außen
const DEL_R      = 26; // Trefferradius (logisch), großzügig für Touch
function deleteHandlePos(p) {
  const hw = p.w / 2, hh = p.h / 2;
  const k = DEL_OFFSET / Math.SQRT2;
  const lx0 = -hw - k, ly0 = -hh - k;
  const cos = Math.cos(p.rot), sin = Math.sin(p.rot);
  return { x: p.cx + (lx0 * cos - ly0 * sin), y: p.cy + (lx0 * sin + ly0 * cos) };
}
function hitDeleteHandle(p, lx, ly) {
  const d = deleteHandlePos(p);
  return Math.hypot(lx - d.x, ly - d.y) <= DEL_R;
}

function hitPhoto(lx, ly) {
  for (let i = photos.length - 1; i >= 0; i--) {
    const p = photos[i];
    const dx = lx - p.cx, dy = ly - p.cy;
    const cos = Math.cos(-p.rot), sin = Math.sin(-p.rot);
    const lxr = dx * cos - dy * sin;
    const lyr = dx * sin + dy * cos;
    if (Math.abs(lxr) <= p.w / 2 && Math.abs(lyr) <= p.h / 2) return i;
  }
  return -1;
}

// ═══════════════════════════════════════
// SMART GUIDES + SNAPPING
// ═══════════════════════════════════════

const SNAP = 30; // snap threshold in logical px — kräftig magnetisch, damit Kanten klar einrasten

function applyGuides(p) {
  guides = [];
  const rotNorm = ((p.rot % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const nearAxis = rotNorm < 0.09 || rotNorm > Math.PI*2 - 0.09
                || Math.abs(rotNorm - Math.PI) < 0.09;
  if (!nearAxis) return;

  let pL = p.cx - p.w/2, pR = p.cx + p.w/2;
  let pT = p.cy - p.h/2, pB = p.cy + p.h/2;

  // ── Slide edge + center snaps ──
  slides.forEach((_, i) => {
    const sL = i * W, sR = (i+1) * W;
    const sCX = sL + W/2, sCY = H/2;

    // Center-to-center snaps
    if (Math.abs(p.cx - sCX) < SNAP)              { p.cx = sCX; pushGuide('v', sCX, 'center'); }
    if (Math.abs(p.cy - sCY) < SNAP)              { p.cy = sCY; pushGuide('h', sCY, 'center'); }
    // Slide outer edge snaps
    if (Math.abs(pL - sL) < SNAP)                 { p.cx = sL + p.w/2; pushGuide('v', sL, 'edge'); }
    if (Math.abs(pR - sR) < SNAP)                 { p.cx = sR - p.w/2; pushGuide('v', sR, 'edge'); }
    if (Math.abs(pT) < SNAP)                      { p.cy = p.h/2; pushGuide('h', 0, 'edge'); }
    if (Math.abs(pB - H) < SNAP)                  { p.cy = H - p.h/2; pushGuide('h', H, 'edge'); }
    // Photo EDGE → Slide CENTER (e.g. top edge of landscape photo to vertical midline)
    if (Math.abs(pT - sCY) < SNAP)                { p.cy = sCY + p.h/2; pushGuide('h', sCY, 'center'); }
    if (Math.abs(pB - sCY) < SNAP)                { p.cy = sCY - p.h/2; pushGuide('h', sCY, 'center'); }
    if (Math.abs(pL - sCX) < SNAP)                { p.cx = sCX + p.w/2; pushGuide('v', sCX, 'center'); }
    if (Math.abs(pR - sCX) < SNAP)                { p.cx = sCX - p.w/2; pushGuide('v', sCX, 'center'); }
    // Equal margin snaps
    if (Math.abs((p.cx-sL)-(sR-p.cx)) < SNAP*2.5){ p.cx = sCX; pushGuide('v', sCX, 'center'); }
    if (Math.abs(pT-(H-pB)) < SNAP*2.5)           { p.cy = sCY; pushGuide('h', sCY, 'center'); }
  });

  // ── Snap center to slide boundaries (between slides) ──
  // This is what makes a spanning photo lock to exactly between 2 slides
  for (let i = 1; i < slides.length; i++) {
    const boundary = i * W;
    if (Math.abs(p.cx - boundary) < SNAP) {
      p.cx = boundary;
      pushGuide('v', boundary, 'edge');
    }
  }

  // Refresh edges after snapping
  pL = p.cx - p.w/2; pR = p.cx + p.w/2;
  pT = p.cy - p.h/2; pB = p.cy + p.h/2;

  // ── Alignment with other photos ──
  photos.forEach((other, j) => {
    if (j === sel) return;
    const oL = other.cx - other.w/2, oR = other.cx + other.w/2;
    const oT = other.cy - other.h/2, oB = other.cy + other.h/2;

    if (Math.abs(p.cx - other.cx) < SNAP) { p.cx = other.cx; pushGuide('v', other.cx, 'align'); }
    if (Math.abs(p.cy - other.cy) < SNAP) { p.cy = other.cy; pushGuide('h', other.cy, 'align'); }
    if (Math.abs(pL - oL) < SNAP) { p.cx = oL + p.w/2; pushGuide('v', oL, 'align'); }
    if (Math.abs(pR - oR) < SNAP) { p.cx = oR - p.w/2; pushGuide('v', oR, 'align'); }
    if (Math.abs(pT - oT) < SNAP) { p.cy = oT + p.h/2; pushGuide('h', oT, 'align'); }
    if (Math.abs(pB - oB) < SNAP) { p.cy = oB - p.h/2; pushGuide('h', oB, 'align'); }
  });

  // ── Equal vertical spacing (top / between / bottom) ──
  checkEqualSpacingV(p);
  checkEqualSpacingH(p);
}

// kind: 'center' (slide/photo center line), 'edge' (slide or canvas boundary),
// 'align' (lining up with another photo). Drives color + label in redraw().
function pushGuide(type, pos, kind) {
  if (!guides.find(g => g.type === type && Math.abs(g.pos - pos) < 2))
    guides.push({ type, pos, kind });
}

// Corner-handle resize never used to invoke the snap logic above (only
// drag-move did), which left resized photos a few px shy of slide/canvas
// edges. This is the resize equivalent of applyGuides(): given the
// in-progress uniform scale factor, finds the nearest slide/canvas boundary
// the resized photo's edges would land within SNAP px of, and returns a
// corrected scale that makes that edge land exactly on the boundary.
function applyResizeGuides(p, scale) {
  guides = [];
  const rotNorm = ((p.rot % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const nearAxis = rotNorm < 0.09 || rotNorm > Math.PI*2 - 0.09
                || Math.abs(rotNorm - Math.PI) < 0.09;
  if (!nearAxis) return scale;

  const xBoundaries = [0, slides.length * W];
  for (let i = 1; i < slides.length; i++) xBoundaries.push(i * W);
  const yBoundaries = [0, H];

  const w = dragStartW * scale, h = dragStartH * scale;
  const pL = p.cx - w/2, pR = p.cx + w/2;
  const pT = p.cy - h/2, pB = p.cy + h/2;

  let best = null; // { error, scale, axis, pos }
  const consider = (err, candidateScale, axis, pos) => {
    if (candidateScale > 0 && err < SNAP && (!best || err < best.error)) {
      best = { error: err, scale: candidateScale, axis, pos };
    }
  };

  xBoundaries.forEach(bx => {
    consider(Math.abs(pR - bx), (2 * (bx - p.cx)) / dragStartW, 'v', bx);
    consider(Math.abs(pL - bx), (2 * (p.cx - bx)) / dragStartW, 'v', bx);
  });
  yBoundaries.forEach(by => {
    consider(Math.abs(pB - by), (2 * (by - p.cy)) / dragStartH, 'h', by);
    consider(Math.abs(pT - by), (2 * (p.cy - by)) / dragStartH, 'h', by);
  });

  if (best) {
    pushGuide(best.axis, best.pos, 'edge');
    return best.scale;
  }
  return scale;
}

// Equal vertical distribution: finds boundaries above/below and snaps to equal gap
function checkEqualSpacingV(p) {
  const pL = p.cx - p.w/2, pR = p.cx + p.w/2;

  // Collect all vertical obstacles that overlap horizontally with p
  // Obstacles: slide edges (0, H) and other photo edges
  let boundaries = [
    { y: 0,  side: 'bottom', label: 'edge' },
    { y: H,  side: 'top',    label: 'edge' }
  ];
  photos.forEach((o, j) => {
    if (j === sel) return;
    const oL = o.cx - o.w/2, oR = o.cx + o.w/2;
    if (Math.min(pR, oR) - Math.max(pL, oL) < Math.min(p.w, o.w) * 0.25) return;
    boundaries.push({ y: o.cy - o.h/2, side: 'top',    ref: o });
    boundaries.push({ y: o.cy + o.h/2, side: 'bottom', ref: o });
  });

  // Find nearest obstacle above p (bottom-side boundaries)
  const above = boundaries
    .filter(b => b.side === 'bottom' && b.y <= p.cy - p.h/2)
    .sort((a,b) => b.y - a.y)[0];
  // Find nearest obstacle below p (top-side boundaries)
  const below = boundaries
    .filter(b => b.side === 'top' && b.y >= p.cy + p.h/2)
    .sort((a,b) => a.y - b.y)[0];

  if (!above || !below) return;

  const topEdge = above.y, bottomEdge = below.y;
  const gapAbove = (p.cy - p.h/2) - topEdge;
  const gapBelow = bottomEdge - (p.cy + p.h/2);

  if (Math.abs(gapAbove - gapBelow) < SNAP * 2.5) {
    p.cy = (topEdge + bottomEdge) / 2;
    const equalGap = (bottomEdge - topEdge - p.h) / 2;
    guides.push({
      type: 'spacing-v',
      topEdge, bottomEdge,
      photoT: p.cy - p.h/2, photoB: p.cy + p.h/2,
      cx: p.cx, gap: equalGap
    });
  }
}

// Equal horizontal distribution
function checkEqualSpacingH(p) {
  const pT = p.cy - p.h/2, pB = p.cy + p.h/2;

  // Use the full canvas extent — includes all slide boundaries
  let boundaries = [
    { x: 0,                  side: 'right', label: 'edge' },
    { x: slides.length * W,  side: 'left',  label: 'edge' }
  ];
  // Add all inner slide boundaries as potential snap walls
  for (let i = 1; i < slides.length; i++) {
    boundaries.push({ x: i * W, side: 'right', label: 'slide' });
    boundaries.push({ x: i * W, side: 'left',  label: 'slide' });
  }
  photos.forEach((o, j) => {
    if (j === sel) return;
    const oT = o.cy - o.h/2, oB = o.cy + o.h/2;
    if (Math.min(pB, oB) - Math.max(pT, oT) < Math.min(p.h, o.h) * 0.25) return;
    boundaries.push({ x: o.cx - o.w/2, side: 'left',  ref: o });
    boundaries.push({ x: o.cx + o.w/2, side: 'right', ref: o });
  });

  const leftOf = boundaries
    .filter(b => b.side === 'right' && b.x <= p.cx - p.w/2)
    .sort((a,b) => b.x - a.x)[0];
  const rightOf = boundaries
    .filter(b => b.side === 'left' && b.x >= p.cx + p.w/2)
    .sort((a,b) => a.x - b.x)[0];

  if (!leftOf || !rightOf) return;

  const leftEdge = leftOf.x, rightEdge = rightOf.x;
  const gapLeft  = (p.cx - p.w/2) - leftEdge;
  const gapRight = rightEdge - (p.cx + p.w/2);

  if (Math.abs(gapLeft - gapRight) < SNAP * 2.5) {
    p.cx = (leftEdge + rightEdge) / 2;
    const equalGap = (rightEdge - leftEdge - p.w) / 2;
    guides.push({
      type: 'spacing-h',
      leftEdge, rightEdge,
      photoL: p.cx - p.w/2, photoR: p.cx + p.w/2,
      cy: p.cy, gap: equalGap
    });
  }
}

// ═══════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════

// Draws a text item's content. Called with the canvas already translated to
// the item's center and rotated — so drawing happens in local (0,0)-centered
// space. `scale` is S for live drawing, EX for export — keeps font sizing
// and line positions correct in logical px regardless of which canvas this
// is rendered into.
function drawTextContent(c, p, scale) {
  const lines = String(p.text || '').split('\n');
  const lineCount = Math.max(1, lines.length);
  const fontSize = Math.max(4, (p.h / lineCount) * 0.78);
  const weight = p.bold ? 700 : (p.weight || 300);
  const style = p.italic ? 'italic' : 'normal';
  c.font = `${style} ${weight} ${Math.round(fontSize * scale)}px "${p.fontFamily}", sans-serif`;
  c.fillStyle = p.color;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  // Laufweite (Letter-Spacing) — ändert nur den Abstand, nicht die Größe.
  const hasLS = ('letterSpacing' in c);
  if (hasLS) c.letterSpacing = ((p.tracking || 0) * scale) + 'px';
  const lineHeight = p.h / lineCount;
  const underlineOffset = fontSize * scale * 0.34;
  const underlineThickness = Math.max(1, fontSize * scale * 0.045);
  lines.forEach((line, i) => {
    const ly = (-p.h / 2 + lineHeight * (i + 0.5)) * scale;
    c.fillText(line, 0, ly);
    if (p.underline) {
      const lineWidth = c.measureText(line).width;
      c.fillRect(-lineWidth / 2, ly + underlineOffset, lineWidth, underlineThickness);
    }
  });
  if (hasLS) c.letterSpacing = '0px'; // zurücksetzen, damit es nicht nachwirkt
}

// Misst die Breite des längsten Textzeilen-Strings in LOGISCHEN px (scale=1),
// inkl. aktueller Laufweite — damit die Box dem gespreizten Text folgen kann.
function measureTextWidth(p) {
  const lines = String(p.text || '').split('\n');
  const lineCount = Math.max(1, lines.length);
  const fontSize = Math.max(4, (p.h / lineCount) * 0.78);
  const weight = p.bold ? 700 : (p.weight || 300);
  const style = p.italic ? 'italic' : 'normal';
  ctx.save();
  ctx.font = `${style} ${weight} ${Math.round(fontSize)}px "${p.fontFamily}", sans-serif`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = ((p.tracking || 0)) + 'px';
  let max = 0;
  lines.forEach(l => { max = Math.max(max, ctx.measureText(l || ' ').width); });
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
  ctx.restore();
  return max;
}

// Zeichnet das Postfolio-Badge (wie im Startbildschirm) als Slide-Element.
// logoDark=true → helles Quadrat mit dunklem P (für dunkle Hintergründe).
function drawLogoItem(c, p, scale) {
  const s = p.w * scale, r = s * 0.24, x = -s / 2, y = -s / 2;
  c.beginPath();
  if (c.roundRect) { c.roundRect(x, y, s, s, r); }
  else {
    c.moveTo(x + r, y); c.arcTo(x + s, y, x + s, y + s, r); c.arcTo(x + s, y + s, x, y + s, r);
    c.arcTo(x, y + s, x, y, r); c.arcTo(x, y, x + s, y, r); c.closePath();
  }
  c.fillStyle = p.logoDark ? '#F4F1EB' : '#2A2826';
  c.fill();
  c.fillStyle = p.logoDark ? '#2A2826' : '#F4F1EB';
  c.font = `600 ${Math.round(s * 0.6)}px "Playfair Display", Georgia, serif`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('P', 0, s * 0.04);
  c.beginPath();
  c.arc(s * 0.27, -s * 0.24, s * 0.06, 0, Math.PI * 2);
  c.fillStyle = '#D10101'; c.fill();
}

// Leerer Foto-Platzhalter (für das Frames-Template): gestrichelte Box + „+".
// Bei Inset wird der weiße Rahmen schon angedeutet. Wird nur am Bildschirm
// gezeichnet (im Export übersprungen).
function drawPlaceholderItem(c, p, scale) {
  const w = p.w * scale, h = p.h * scale, x = -w / 2, y = -h / 2;
  if (p.frame && p.frame.width > 0) {
    const fw = p.frame.width * scale;
    c.fillStyle = p.frame.color || '#ffffff';
    c.fillRect(x - fw, y - fw, w + 2 * fw, h + 2 * fw);
  }
  c.fillStyle = 'rgba(42,40,38,0.06)';
  c.fillRect(x, y, w, h);
  c.strokeStyle = 'rgba(42,40,38,0.45)';
  c.lineWidth = 1.5 * DPR;
  c.setLineDash([6 * DPR, 5 * DPR]);
  c.strokeRect(x, y, w, h);
  c.setLineDash([]);
  const pl = Math.min(w, h) * 0.12;
  c.strokeStyle = 'rgba(42,40,38,0.5)';
  c.lineWidth = 2.2 * DPR;
  c.beginPath();
  c.moveTo(-pl, 0); c.lineTo(pl, 0);
  c.moveTo(0, -pl); c.lineTo(0, pl);
  c.stroke();
}

function renderNow() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Slide backgrounds
  slides.forEach((slide, i) => {
    ctx.save();
    ctx.beginPath();
    ctx.rect(i * W * S, 0, W * S, H * S);
    ctx.clip();
    ctx.fillStyle = slide.bg;
    ctx.fillRect(i * W * S, 0, W * S, H * S);
    ctx.restore();
  });

  // „+"-Platzhalter mittig auf jeder LEEREN Slide — antippen lädt ein Foto
  // (die normale Tippen-auf-leere-Fläche-Logik öffnet den Dateidialog). Ersetzt
  // den früheren „+ Photo"-Button.
  const occupied = new Set();
  photos.forEach(p => occupied.add(slideIndexOf(p)));
  slides.forEach((slide, i) => {
    if (occupied.has(i)) return;
    const cxp = (i * W + W / 2) * S, cyp = (H / 2) * S;
    const r = 36 * S;
    const onDark = (typeof slide.bg === 'string') && /^#(0|1|2|3|4|5)/i.test(slide.bg);
    const tint = onDark ? 'rgba(255,255,255,0.5)' : 'rgba(42,40,38,0.32)';
    ctx.save();
    ctx.strokeStyle = tint; ctx.fillStyle = tint;
    ctx.lineWidth = 2 * DPR;
    ctx.setLineDash([6 * DPR, 5 * DPR]);
    ctx.beginPath(); ctx.arc(cxp, cyp, r, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineWidth = 3 * DPR;
    const pl = 15 * S;
    ctx.beginPath();
    ctx.moveTo(cxp - pl, cyp); ctx.lineTo(cxp + pl, cyp);
    ctx.moveTo(cxp, cyp - pl); ctx.lineTo(cxp, cyp + pl);
    ctx.stroke();
    ctx.font = `${Math.round(13 * DPR)}px Helvetica Neue, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('Tap to add a photo', cxp, cyp + r + 12 * DPR);
    ctx.restore();
  });

  // Photos + text items — no clipping for seamless spanning
  photos.forEach(p => {
    ctx.save();
    ctx.translate(p.cx * S, p.cy * S);
    ctx.rotate(p.rot);
    if (p.kind === 'text') {
      drawTextContent(ctx, p, S);
      ctx.restore();
      return;
    }
    if (p.kind === 'logo') { drawLogoItem(ctx, p, S); ctx.restore(); return; }
    if (p.kind === 'placeholder') { drawPlaceholderItem(ctx, p, S); ctx.restore(); return; }
    if (p.frame && p.frame.width > 0) {
      const ins = frameInsets(p);
      ctx.fillStyle = p.frame.color;
      ctx.fillRect(-(p.w / 2 + ins.left) * S, -(p.h / 2 + ins.top) * S,
                    (p.w + ins.left + ins.right) * S, (p.h + ins.top + ins.bottom) * S);
    }
    const c = p.crop || { x: 0, y: 0, w: 1, h: 1 };
    // Auf dem Bildschirm aus der herunterskalierten Vorschau zeichnen (Punkt 2);
    // crop ist anteilig (0..1), daher mit den Maßen der jeweiligen Quelle skalieren.
    const src = p.screen || p.img;
    const nw = srcW(src), nh = srcH(src);
    const sx = c.x * nw, sw = c.w * nw;
    const sy = c.y * nh, sh = c.h * nh;
    ctx.drawImage(src, sx, sy, sw, sh, -p.w / 2 * S, -p.h / 2 * S, p.w * S, p.h * S);
    ctx.restore();
  });

  // Slide dividers (thin dashed lines)
  for (let i = 1; i < slides.length; i++) {
    ctx.save();
    ctx.strokeStyle = 'rgba(83,80,75,0.22)';
    ctx.lineWidth   = 0.75 * DPR;
    ctx.setLineDash([4 * DPR, 5 * DPR]);
    ctx.beginPath();
    ctx.moveTo(i * W * S, 0);
    ctx.lineTo(i * W * S, H * S);
    ctx.stroke();
    ctx.restore();
  }

  // Slide numbers (top-left of each slide)
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  slides.forEach((_, i) => {
    const active = (i === activeSlide);
    ctx.font      = `${Math.round(10 * DPR)}px Helvetica Neue, sans-serif`;
    ctx.fillStyle = active ? 'rgba(42,40,38,0.55)' : 'rgba(42,40,38,0.25)';
    ctx.fillText(String(i + 1).padStart(2, '0'), i * W * S + 10 * DPR, 10 * DPR);
  });

  // Smart guides — color + label per kind, so it's obvious WHAT a photo is
  // snapping to (center line, an edge, another photo, or equal spacing).
  const GUIDE_STYLE = {
    center: { color: '#1E8FFF', label: 'CENTER', dash: [2*DPR, 2*DPR] },
    edge:   { color: '#D10101', label: 'EDGE',    dash: [7*DPR, 3*DPR] },
    align:  { color: '#FF8A00', label: 'ALIGN',   dash: [4*DPR, 2*DPR] },
  };
  if (guides.length > 0) {
    ctx.save();
    const totalW = slides.length * W;
    const selP = (sel >= 0 && sel < photos.length) ? photos[sel] : null;

    guides.forEach(g => {
      if (g.type === 'v' || g.type === 'h') {
        const style = GUIDE_STYLE[g.kind] || GUIDE_STYLE.edge;
        ctx.globalAlpha = 1;
        ctx.strokeStyle = style.color;
        ctx.lineWidth   = 1.4 * DPR;
        ctx.setLineDash(style.dash);
        ctx.beginPath();
        if (g.type === 'v') {
          ctx.moveTo(g.pos * S, 0);
          ctx.lineTo(g.pos * S, H * S);
        } else {
          ctx.moveTo(0, g.pos * S);
          ctx.lineTo(totalW * S, g.pos * S);
        }
        ctx.stroke();

        // Marker dot at the snap point on the selected photo's own edge/center,
        // plus a small uppercase tag naming the snap kind.
        if (selP) {
          ctx.setLineDash([]);
          let mx, my;
          if (g.type === 'v') { mx = g.pos * S; my = selP.cy * S; }
          else                { mx = selP.cx * S; my = g.pos * S; }
          ctx.beginPath();
          ctx.arc(mx, my, 3.5 * DPR, 0, Math.PI * 2);
          ctx.fillStyle = style.color;
          ctx.fill();

          // (Snap-Textlabels bewusst entfernt — nur Linie + Punkt, kein Text.)
        }

      } else if (g.type === 'spacing-v') {
        // Equal vertical spacing brackets
        const TICK = 18 * DPR;
        const xDraw = g.cx * S;
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#1FB67A';
        ctx.fillStyle   = '#1FB67A';
        ctx.lineWidth   = 1.4 * DPR;
        ctx.setLineDash([]);
        // Top gap: topEdge → photoT
        drawVBracket(xDraw, g.topEdge * S, g.photoT * S, TICK);
        // Bottom gap: photoB → bottomEdge
        drawVBracket(xDraw, g.photoB * S, g.bottomEdge * S, TICK);

      } else if (g.type === 'spacing-h') {
        // Equal horizontal spacing brackets
        const TICK = 18 * DPR;
        const yDraw = g.cy * S;
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#1FB67A';
        ctx.fillStyle   = '#1FB67A';
        ctx.lineWidth   = 1.4 * DPR;
        ctx.setLineDash([]);
        drawHBracket(yDraw, g.leftEdge * S, g.photoL * S, TICK);
        drawHBracket(yDraw, g.photoR * S, g.rightEdge * S, TICK);
      }
    });

    ctx.setLineDash([]);
    ctx.restore();
  }

  // Center crosshair: full-length lines for selected photo (especially useful for spanning photos)
  if (sel >= 0 && sel < photos.length) {
    const p = photos[sel];
    const alpha = dragMode === 'move' ? 0.55 : 0.25;
    const totalW = slides.length * W;
    ctx.save();
    ctx.strokeStyle = `rgba(209,1,1,${alpha})`;
    ctx.lineWidth   = 1 * DPR;
    ctx.setLineDash([3*DPR, 2*DPR]);
    ctx.beginPath();
    // Horizontal center line — full canvas width
    ctx.moveTo(0, p.cy * S);
    ctx.lineTo(totalW * S, p.cy * S);
    // Vertical center line — full canvas height
    ctx.moveTo(p.cx * S, 0);
    ctx.lineTo(p.cx * S, H * S);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Selection handles
  if (sel >= 0 && sel < photos.length) {
    drawSelection(photos[sel]);
  }
}

// Helper: draw vertical bracket (spine + two tick caps) at x between y1 and y2
function drawVBracket(x, y1, y2, tick) {
  const mid = (y1 + y2) / 2;
  ctx.beginPath();
  // Spine
  ctx.moveTo(x, y1); ctx.lineTo(x, y2);
  // Top cap
  ctx.moveTo(x - tick, y1); ctx.lineTo(x + tick, y1);
  // Bottom cap
  ctx.moveTo(x - tick, y2); ctx.lineTo(x + tick, y2);
  // Center arrow chevrons
  const A = Math.min(7*DPR, (y2-y1)*0.18);
  ctx.moveTo(x - A*0.7, mid - A); ctx.lineTo(x, mid - A*0.2); ctx.lineTo(x + A*0.7, mid - A);
  ctx.moveTo(x - A*0.7, mid + A); ctx.lineTo(x, mid + A*0.2); ctx.lineTo(x + A*0.7, mid + A);
  ctx.stroke();
}

// Helper: draw horizontal bracket at y between x1 and x2
function drawHBracket(y, x1, x2, tick) {
  const mid = (x1 + x2) / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y); ctx.lineTo(x2, y);
  ctx.moveTo(x1, y - tick); ctx.lineTo(x1, y + tick);
  ctx.moveTo(x2, y - tick); ctx.lineTo(x2, y + tick);
  const A = Math.min(7*DPR, (x2-x1)*0.18);
  ctx.moveTo(mid - A, y - A*0.7); ctx.lineTo(mid - A*0.2, y); ctx.lineTo(mid - A, y + A*0.7);
  ctx.moveTo(mid + A, y - A*0.7); ctx.lineTo(mid + A*0.2, y); ctx.lineTo(mid + A, y + A*0.7);
  ctx.stroke();
}

function drawSelection(p) {
  const hw = p.w / 2 * S;
  const hh = p.h / 2 * S;
  const HR = 6 * DPR;  // corner handle radius (canvas px) — dezenter
  const RO = ROT_OFFSET * S; // rotation handle offset (canvas px)

  ctx.save();
  ctx.translate(p.cx * S, p.cy * S);
  ctx.rotate(p.rot);

  // Dashed bounding box
  ctx.strokeStyle = '#D10101';
  ctx.lineWidth   = 1.5 * DPR;
  ctx.setLineDash([5 * DPR, 3 * DPR]);
  ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);
  ctx.setLineDash([]);

  // Corner dots
  [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, HR, 0, Math.PI * 2);
    ctx.fillStyle = '#D10101';
    ctx.fill();
  });

  // Rotation handle line + circle
  ctx.strokeStyle = '#D10101';
  ctx.lineWidth   = 1.5 * DPR;
  ctx.beginPath();
  ctx.moveTo(0, -hh);
  ctx.lineTo(0, -hh - RO);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -hh - RO, HR * 1.2, 0, Math.PI * 2);
  ctx.fillStyle = '#D10101';
  ctx.fill();
  // Rotate icon hint
  ctx.fillStyle = 'white';
  ctx.font = `${Math.round(8 * DPR)}px Helvetica Neue`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('↻', 0, -hh - RO);

  // Lösch-Griff: roter Kreis mit Mülleimer-Symbol (löscht Foto ODER Text),
  // diagonal außerhalb der oberen linken Ecke.
  const DK = (DEL_OFFSET / Math.SQRT2) * S;
  const dxh = -hw - DK, dyh = -hh - DK;
  const r = HR * 1.5;
  ctx.beginPath();
  ctx.arc(dxh, dyh, r, 0, Math.PI * 2);
  ctx.fillStyle = '#D10101';
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1.5 * DPR;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const u = r * 0.42;
  const topY = dyh - u * 0.7, botY = dyh + u * 1.05;
  ctx.beginPath(); ctx.moveTo(dxh - u, topY); ctx.lineTo(dxh + u, topY); ctx.stroke();           // Deckel
  ctx.beginPath();                                                                                  // Griff
  ctx.moveTo(dxh - u * 0.34, topY); ctx.lineTo(dxh - u * 0.34, topY - u * 0.36);
  ctx.lineTo(dxh + u * 0.34, topY - u * 0.36); ctx.lineTo(dxh + u * 0.34, topY); ctx.stroke();
  ctx.beginPath();                                                                                  // Korpus
  ctx.moveTo(dxh - u * 0.78, topY); ctx.lineTo(dxh - u * 0.6, botY);
  ctx.lineTo(dxh + u * 0.6, botY); ctx.lineTo(dxh + u * 0.78, topY); ctx.stroke();
  ctx.beginPath();                                                                                  // Innenstriche
  ctx.moveTo(dxh - u * 0.22, topY + u * 0.3); ctx.lineTo(dxh - u * 0.18, botY - u * 0.24);
  ctx.moveTo(dxh + u * 0.22, topY + u * 0.3); ctx.lineTo(dxh + u * 0.18, botY - u * 0.24);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════
// MOUSE INTERACTION
// ═══════════════════════════════════════

canvas.addEventListener('mousedown', e => {
  // Pipette aktiv → ausschließlich Farbe picken, keine Auswahl/Verschiebung.
  if (pickingFrameColor || pickingBgColor) { e.preventDefault(); doPick(e.clientX, e.clientY); return; }
  const { lx, ly } = clientToLogical(e.clientX, e.clientY);
  addCandidate = null;

  // Lösch-Griff (× am Foto) zuerst prüfen.
  if (sel >= 0 && hitDeleteHandle(photos[sel], lx, ly)) { deleteSelected(); return; }

  if (sel >= 0 && hitRotHandle(photos[sel], lx, ly)) {
    dragMode      = 'rotate';
    armUndo       = true;
    dragStartAngle = Math.atan2(ly - photos[sel].cy, lx - photos[sel].cx);
    dragStartRot   = photos[sel].rot;
    return;
  }

  if (sel >= 0 && hitCornerHandle(photos[sel], lx, ly)) {
    dragMode      = 'resize';
    armUndo       = true;
    dragStartDist = Math.hypot(lx - photos[sel].cx, ly - photos[sel].cy);
    dragStartW    = photos[sel].w;
    dragStartH    = photos[sel].h;
    return;
  }

  const hit = hitPhoto(lx, ly);
  if (hit >= 0) {
    tapAlreadySelected = (sel === hit);
    sel          = hit;
    dragMode     = 'move';
    armUndo      = true;
    dragStartMX  = e.clientX;
    dragStartMY  = e.clientY;
    dragStartCX  = photos[sel].cx;
    dragStartCY  = photos[sel].cy;
    activeSlide  = Math.max(0, Math.min(slides.length - 1, Math.floor(photos[sel].cx / W)));
  } else {
    sel          = -1;
    activeSlide  = Math.max(0, Math.min(slides.length - 1, Math.floor(lx / W)));
    addCandidate = { lx, ly, mx: e.clientX, my: e.clientY };
  }
  syncBgButtons();
  updateDots();
  updateDeleteBtn();
  redraw();
});

window.addEventListener('mousemove', e => {
  if (!dragMode || sel < 0) return;
  if (armUndo) { beginAction(); armUndo = false; } // ein Undo-Schritt pro Geste
  photos[sel].fitted = false; // frei bewegt → Rahmen rundum gleich (siehe frameInsets)
  if (dragMode === 'move') {
    const p = photos[sel];
    p.cx = dragStartCX + (e.clientX - dragStartMX) / DSCALE;
    p.cy = dragStartCY + (e.clientY - dragStartMY) / DSCALE;
    applyGuides(p);
    redraw();
  } else if (dragMode === 'rotate') {
    const { lx, ly } = clientToLogical(e.clientX, e.clientY);
    const angle = Math.atan2(ly - photos[sel].cy, lx - photos[sel].cx);
    photos[sel].rot = dragStartRot + (angle - dragStartAngle);
    redraw();
  } else if (dragMode === 'resize') {
    const { lx, ly } = clientToLogical(e.clientX, e.clientY);
    const p = photos[sel];
    const dist  = Math.hypot(lx - p.cx, ly - p.cy);
    let scale = Math.max(0.05, dist / dragStartDist);
    scale = applyResizeGuides(p, scale);
    p.w = Math.max(20, dragStartW * scale);
    p.h = Math.max(20, dragStartH * scale);
    syncFrameGroupInsets(p);
    redraw();
  }
});

window.addEventListener('mouseup', e => {
  const wasDragging = !!dragMode;
  // Tap (ohne Ziehen) auf einen leeren Platzhalter → Datei zum Befüllen wählen.
  if (dragMode === 'move' && tapAlreadySelected && sel >= 0 && photos[sel] && photos[sel].kind === 'placeholder'
      && Math.hypot(e.clientX - dragStartMX, e.clientY - dragStartMY) < 6) {
    dragMode = null; guides = []; armUndo = false;
    fillPlaceholder(sel);
    return;
  }
  dragMode = null; guides = []; armUndo = false;
  if (addCandidate) {
    const moved = Math.hypot(e.clientX - addCandidate.mx, e.clientY - addCandidate.my);
    if (moved < 6) {
      pendingAddPos = { cx: addCandidate.lx, cy: addCandidate.ly };
      document.getElementById('fileInput').click();
    }
    addCandidate = null;
  }
  if (wasDragging) scheduleSave();
  redraw();
});

canvas.addEventListener('wheel', e => {
  if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
  const { lx, ly } = clientToLogical(e.clientX, e.clientY);
  const hit = hitPhoto(lx, ly);
  if (hit < 0) return;
  e.preventDefault();
  beginAction('wheel');
  const factor = e.deltaY > 0 ? 0.93 : 1.07;
  photos[hit].w = Math.max(40, photos[hit].w * factor);
  photos[hit].h = Math.max(40, photos[hit].h * factor);
  photos[hit].fitted = false;
  syncFrameGroupInsets(photos[hit]);
  if (sel !== hit) { sel = hit; updateDeleteBtn(); }
  redraw();
}, { passive: false });

// ═══════════════════════════════════════
// KEYBOARD: nudge (arrows) + precise scale (⌘/Ctrl + / -)
// ═══════════════════════════════════════

window.addEventListener('keydown', e => {
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  // Vollbild-Vorschau offen → Tastatur nur zum Schließen.
  if (document.getElementById('preview').classList.contains('show')) {
    if (e.key === 'Escape') closePreview();
    return;
  }
  if (cropOpen) {
    if (e.key === 'Escape') closeCropOverlay();
    if (e.key === 'Enter')  document.getElementById('cropApply').click();
    return;
  }

  // Undo / Redo (⌘/Ctrl+Z, ⌘/Ctrl+Shift+Z bzw. Ctrl+Y) — auch ohne Auswahl.
  const isMod = e.metaKey || e.ctrlKey;
  if (isMod && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if (isMod && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); redo(); return; }

  if (sel < 0 || sel >= photos.length) return;
  const p   = photos[sel];
  const mod = e.metaKey || e.ctrlKey;

  // Entf / Backspace → ausgewähltes Foto/Text löschen
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); return; }

  // ⌘/Ctrl + "+"/"-" → pedantically precise resize, anchored on center
  if (mod && (e.key === '+' || e.key === '=')) {
    e.preventDefault();
    beginAction('nudge'); p.fitted = false;
    p.w = Math.max(20, p.w * 1.01);
    p.h = Math.max(20, p.h * 1.01);
    redraw();
    return;
  }
  if (mod && (e.key === '-' || e.key === '_')) {
    e.preventDefault();
    beginAction('nudge'); p.fitted = false;
    p.w = Math.max(20, p.w * 0.99);
    p.h = Math.max(20, p.h * 0.99);
    redraw();
    return;
  }

  // Arrow keys → nudge position. Shift = coarse step.
  const STEP = e.shiftKey ? 10 : 1;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    beginAction('nudge'); p.fitted = false;
  }
  if (e.key === 'ArrowUp')    { e.preventDefault(); p.cy -= STEP; redraw(); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); p.cy += STEP; redraw(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); p.cx -= STEP; redraw(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); p.cx += STEP; redraw(); }

  // Enter → instantly fit the selected photo into its slide / frame
  if (e.key === 'Enter') { e.preventDefault(); fitSelectedPhoto(); }
});

// ═══════════════════════════════════════
// TOUCH INTERACTION
// ═══════════════════════════════════════

canvas.addEventListener('touchstart', e => {
  // Pipette aktiv → ausschließlich Farbe picken.
  if ((pickingFrameColor || pickingBgColor) && e.touches.length === 1) {
    e.preventDefault();
    const t = e.touches[0];
    pickXY = { x: t.clientX, y: t.clientY };  // erst beim Loslassen picken
    updateLoupe(t.clientX, t.clientY);
    return;
  }
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const { lx, ly } = clientToLogical(t.clientX, t.clientY);
    addCandidate = null;

    // Lösch-Griff (× am Foto) zuerst prüfen.
    if (sel >= 0 && hitDeleteHandle(photos[sel], lx, ly)) { e.preventDefault(); deleteSelected(); return; }

    // Rotation handle
    if (sel >= 0 && hitRotHandle(photos[sel], lx, ly)) {
      e.preventDefault();
      dragMode       = 'rotate';
      armUndo        = true;
      dragStartAngle = Math.atan2(ly - photos[sel].cy, lx - photos[sel].cx);
      dragStartRot   = photos[sel].rot;
      return;
    }

    // Corner handle → resize
    if (sel >= 0 && hitCornerHandle(photos[sel], lx, ly)) {
      e.preventDefault();
      dragMode      = 'resize';
      armUndo       = true;
      dragStartDist = Math.hypot(lx - photos[sel].cx, ly - photos[sel].cy);
      dragStartW    = photos[sel].w;
      dragStartH    = photos[sel].h;
      return;
    }

    const hit = hitPhoto(lx, ly);
    if (hit >= 0) {
      e.preventDefault();
      tapAlreadySelected = (sel === hit);
      sel         = hit;
      dragMode    = 'move';
      armUndo     = true;
      dragStartMX = t.clientX;
      dragStartMY = t.clientY;
      dragStartCX = photos[sel].cx;
      dragStartCY = photos[sel].cy;
      activeSlide = Math.max(0, Math.min(slides.length - 1, Math.floor(photos[sel].cx / W)));
    } else {
      // Let container scroll — but remember this spot in case it turns out to be a tap
      sel          = -1;
      activeSlide  = Math.max(0, Math.min(slides.length - 1, Math.floor(lx / W)));
      addCandidate = { lx, ly, mx: t.clientX, my: t.clientY };
    }
    syncBgButtons();
    updateDots();
    updateDeleteBtn();
    redraw();
  }

  if (e.touches.length === 2) {
    e.preventDefault();
    dragMode = null;
    addCandidate = null;
    const t1 = e.touches[0], t2 = e.touches[1];
    const mx = (t1.clientX + t2.clientX) / 2;
    const my = (t1.clientY + t2.clientY) / 2;
    const { lx, ly } = clientToLogical(mx, my);
    const hit = hitPhoto(lx, ly);
    if (hit >= 0) {
      sel = hit;
      armUndo = true;
      pinchData = {
        dist:  Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY),
        angle: Math.atan2(t1.clientY - t2.clientY, t1.clientX - t2.clientX),
        w: photos[sel].w, h: photos[sel].h, rot: photos[sel].rot
      };
      updateDeleteBtn();
      redraw();
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if ((pickingFrameColor || pickingBgColor) && e.touches.length === 1) {
    e.preventDefault();
    const t = e.touches[0];
    pickXY = { x: t.clientX, y: t.clientY };
    updateLoupe(t.clientX, t.clientY);
    return;
  }
  if (sel >= 0 && (dragMode || pinchData)) {
    if (armUndo) { beginAction(); armUndo = false; } // ein Undo-Schritt pro Geste
    photos[sel].fitted = false; // frei bewegt → Rahmen rundum gleich
  }
  if (e.touches.length === 1) {
    if (dragMode === 'move' && sel >= 0) {
      e.preventDefault();
      const t = e.touches[0];
      const p = photos[sel];
      p.cx = dragStartCX + (t.clientX - dragStartMX) / DSCALE;
      p.cy = dragStartCY + (t.clientY - dragStartMY) / DSCALE;
      applyGuides(p);
      redraw();
    } else if (dragMode === 'rotate' && sel >= 0) {
      e.preventDefault();
      const t = e.touches[0];
      const { lx, ly } = clientToLogical(t.clientX, t.clientY);
      const angle = Math.atan2(ly - photos[sel].cy, lx - photos[sel].cx);
      photos[sel].rot = dragStartRot + (angle - dragStartAngle);
      redraw();
    } else if (dragMode === 'resize' && sel >= 0) {
      e.preventDefault();
      const t = e.touches[0];
      const { lx, ly } = clientToLogical(t.clientX, t.clientY);
      const p = photos[sel];
      const dist  = Math.hypot(lx - p.cx, ly - p.cy);
      let scale = Math.max(0.05, dist / dragStartDist);
      scale = applyResizeGuides(p, scale);
      p.w = Math.max(20, dragStartW * scale);
      p.h = Math.max(20, dragStartH * scale);
      syncFrameGroupInsets(p);
      redraw();
    }
  }

  if (e.touches.length === 2 && pinchData && sel >= 0) {
    e.preventDefault();
    const t1 = e.touches[0], t2 = e.touches[1];
    const dist  = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    const angle = Math.atan2(t1.clientY - t2.clientY, t1.clientX - t2.clientX);
    const scale = dist / pinchData.dist;
    const p = photos[sel];
    p.w   = Math.max(40, pinchData.w * scale);
    p.h   = Math.max(40, pinchData.h * scale);
    p.rot = pinchData.rot + (angle - pinchData.angle);
    syncFrameGroupInsets(p);
    redraw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (pickingFrameColor || pickingBgColor) {
    if (pickXY) doPick(pickXY.x, pickXY.y);  // Farbe an der zuletzt gezeigten Stelle übernehmen
    pickXY = null;
    return;
  }
  if (e.touches.length < 2) pinchData = null;
  if (e.touches.length === 0) {
    // Tap (ohne Ziehen) auf einen leeren Platzhalter → Datei zum Befüllen wählen.
    const ct0 = e.changedTouches[0];
    if (dragMode === 'move' && tapAlreadySelected && sel >= 0 && photos[sel] && photos[sel].kind === 'placeholder'
        && ct0 && Math.hypot(ct0.clientX - dragStartMX, ct0.clientY - dragStartMY) < 8) {
      dragMode = null; guides = []; armUndo = false; addCandidate = null;
      fillPlaceholder(sel);
      return;
    }
    dragMode = null; guides = []; armUndo = false;
    if (addCandidate) {
      const ct = e.changedTouches[0];
      const moved = ct ? Math.hypot(ct.clientX - addCandidate.mx, ct.clientY - addCandidate.my) : 999;
      if (moved < 8) {
        pendingAddPos = { cx: addCandidate.lx, cy: addCandidate.ly };
        document.getElementById('fileInput').click();
      }
      addCandidate = null;
    }
    scheduleSave();
    redraw();
  }
}, { passive: true });

document.getElementById('fileInput').addEventListener('change', function() {
  if (!this.files[0]) return;
  const file = this.files[0];
  this.value = '';
  // Wurde ein Frames-Platzhalter angetippt → Foto dort einsetzen.
  if (pendingReplaceIdx >= 0 && photos[pendingReplaceIdx] && photos[pendingReplaceIdx].kind === 'placeholder') {
    const idx = pendingReplaceIdx; pendingReplaceIdx = -1;
    loadPhotoIntoPlaceholder(file, idx);
    return;
  }
  pendingReplaceIdx = -1;
  // Sonst: an Tipp-Position bzw. zentriert auf der aktiven Slide.
  const pos = pendingAddPos || { cx: activeSlide * W + W / 2, cy: H / 2 };
  pendingAddPos = null;
  loadPhoto(file, pos.cx, pos.cy);
});

// Ersetzt einen Platzhalter durch ein Foto, das die Box füllt (Cover-Crop),
// inkl. evtl. Rahmen (Inset). Geometrie/Position bleiben erhalten.
function loadPhotoIntoPlaceholder(file, idx) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const ph = photos[idx];
      if (!ph || ph.kind !== 'placeholder') return;
      beginAction();
      const photo = {
        kind: 'image', img, screen: buildScreenCanvas(img),
        cx: ph.cx, cy: ph.cy, w: ph.w, h: ph.h, rot: ph.rot || 0,
        crop: { x: 0, y: 0, w: 1, h: 1 },
        frame: ph.frame ? { ...ph.frame } : null,
        role: ph.role, frameGroup: ph.frameGroup,   // Inset-Verknüpfung beibehalten
        slot: 0, split: null, fitted: false
      };
      // Cover-Crop: Bild exakt auf die Box-Proportion zuschneiden.
      photo.crop = adjustCropToAspect(photo, ph.w / ph.h);
      photos[idx] = photo;
      sel = idx;
      updateDeleteBtn(); redraw(); scheduleSave();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function loadPhoto(file, targetCX, targetCY) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxW = W * 0.85, maxH = H * 0.85;
      let w = img.naturalWidth, h = img.naturalHeight;
      const ratio = Math.min(maxW / w, maxH / h);
      w *= ratio; h *= ratio;
      beginAction();
      photos.push({ kind: 'image', img, screen: buildScreenCanvas(img), cx: targetCX, cy: targetCY, w, h, rot: 0, crop: { x: 0, y: 0, w: 1, h: 1 }, frame: null, slot: 0, split: null, fitted: false });
      sel = photos.length - 1;
      updateDeleteBtn();
      redraw();
      scheduleSave();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

const TEXT_FONTS = ['Bodoni Moda', 'Playfair Display', 'DM Serif Display', 'Bricolage Grotesque', 'Archivo', 'Instrument Serif', 'Cormorant Garamond', 'Fraunces', 'Arapey', 'Poppins'];

// A text item reuses the same cx/cy/w/h/rot fields as a photo, so all the
// generic geometry code (hit-testing, drag/rotate/resize, snapping, layer
// ordering) works on it unchanged — only rendering and the toolbar panel
// branch on `kind === 'text'`.
function addTextItem() {
  beginAction();
  const fontSize = 64; // logical px, single line, before any resizing
  const w = 480, h = fontSize / 0.78; // matches drawTextContent's size formula
  photos.push({
    kind: 'text', text: 'Your text', fontFamily: TEXT_FONTS[0], color: '#111111',
    weight: 300, bold: false, italic: false, underline: false,
    cx: activeSlide * W + W / 2, cy: H / 2, w, h, rot: 0
  });
  sel = photos.length - 1;
  updateDeleteBtn();
  redraw();
  scheduleSave();
}

document.getElementById('addTextBtn').addEventListener('click', addTextItem);

// Erzeugt ein Text-Item mit sinnvoller Box-Größe aus einer Wunsch-Schriftgröße.
function makeTextItem(text, fontFamily, opts = {}) {
  const size = opts.size || 64;
  const lines = String(text).split('\n').length;
  const h = (size / 0.78) * lines;
  const w = Math.max(160, Math.round(text.length * size * 0.62));
  return {
    kind: 'text', text, fontFamily, color: opts.color || '#111111',
    weight: opts.weight || 300, bold: !!opts.bold, italic: !!opts.italic,
    underline: false, cx: 0, cy: 0, w, h, rot: 0
  };
}

// Fügt ein fertiges Schrift-Duo (Subline + Headline) zentriert auf der aktiven
// Slide ein — ein Klick, fertiger Editorial-/Magazin-Look. Beide Texte sind
// danach frei editier-/verschiebbar.
function addTextPair(kind) {
  beginAction();
  const cx = activeSlide * W + W / 2, cy = H / 2;
  let sub, head;
  if (kind === 'magazin') {
    sub  = makeTextItem('TRAVEL DIARY', 'Archivo',     { weight: 500, size: 38 });
    head = makeTextItem('MONTENEGRO',   'Bodoni Moda', { weight: 700, size: 116 });
  } else { // editorial — Ogg-Look: kursive Subline über Versal-Headline
    sub  = makeTextItem('Le',   'Cormorant Garamond', { italic: true, weight: 500, size: 78 });
    head = makeTextItem('PORT', 'Playfair Display',    { weight: 700, size: 150 });
  }
  head.cx = cx; head.cy = cy;
  sub.cx  = cx; sub.cy  = cy - head.h * 0.5 - sub.h * 0.15;
  photos.push(sub, head);
  sel = photos.length - 1; // Headline ausgewählt
  updateDeleteBtn();
  redraw();
  scheduleSave();
}

// ── Frames-Layout (Hintergrundfoto + gerahmtes Inset, n gestapelte Bänder) ──
function fillPlaceholder(idx) {
  pendingReplaceIdx = idx;
  pendingAddPos = null;
  document.getElementById('fileInput').click();
}
function framesSlideOccupied(idx) {
  return photos.some(p => slideIndexOf(p) === idx);
}
function addFramesLayout(n) {
  beginAction();
  let idx = activeSlide;
  if (framesSlideOccupied(idx) && slides.length < 20) {
    slides.push({ bg: slides[slides.length - 1].bg });
    idx = slides.length - 1;
  }
  const cxBase = idx * W;
  const bandH = H / n;
  const frameW = n >= 3 ? 14 : 22;       // Inset-Rahmenbreite
  const gid = ++frameGroupSeq;           // verbindet die Insets dieser Gruppe (gleiche Größe)
  const insetW = W * 0.52;
  const insetH = Math.min(bandH * 0.62, insetW * 1.25);
  for (let i = 0; i < n; i++) {
    const bandCY = i * bandH + bandH / 2;
    photos.push({ kind: 'placeholder', role: 'bg', frameGroup: gid, cx: cxBase + W / 2, cy: bandCY, w: W, h: bandH, rot: 0, frame: null });
    photos.push({ kind: 'placeholder', role: 'inset', frameGroup: gid, cx: cxBase + W / 2, cy: bandCY, w: insetW, h: insetH, rot: 0, frame: { width: frameW, color: '#ffffff' } });
  }
  activeSlide = idx; sel = -1;
  resizeCanvas(); syncBgButtons(); updateDots(); updateDeleteBtn();
  redraw(); scheduleSave();
  setTimeout(() => { wrap.scrollLeft = idx * W * DSCALE; }, 30);
}

// ═══════════════════════════════════════
// VOLLBILD-VORSCHAU (Preview) — Slide groß, per Wisch durchblättern
// ═══════════════════════════════════════
let previewUrls = [];
// Rendert EINE Slide eigenständig auf eine Leinwand (mult = Pixel je logischer
// Einheit). Platzhalter werden übersprungen.
function renderPreviewCanvas(i, mult) {
  const ec = document.createElement('canvas');
  ec.width = Math.max(1, Math.round(W * mult));
  ec.height = Math.max(1, Math.round(H * mult));
  const c = ec.getContext('2d');
  c.imageSmoothingEnabled = true; c.imageSmoothingQuality = 'high';
  c.save(); c.beginPath(); c.rect(0, 0, ec.width, ec.height); c.clip();
  c.fillStyle = slides[i].bg; c.fillRect(0, 0, ec.width, ec.height);
  photos.forEach(p => {
    c.save();
    c.translate((p.cx - i * W) * mult, p.cy * mult);
    c.rotate(p.rot || 0);
    if (p.kind === 'text')        { drawTextContent(c, p, mult); c.restore(); return; }
    if (p.kind === 'logo')        { drawLogoItem(c, p, mult);    c.restore(); return; }
    if (p.kind === 'placeholder') { c.restore(); return; }
    if (p.frame && p.frame.width > 0) {
      const ins = frameInsets(p);
      c.fillStyle = p.frame.color;
      c.fillRect(-(p.w / 2 + ins.left) * mult, -(p.h / 2 + ins.top) * mult,
                  (p.w + ins.left + ins.right) * mult, (p.h + ins.top + ins.bottom) * mult);
    }
    const cr = p.crop || { x: 0, y: 0, w: 1, h: 1 };
    const sx = cr.x * p.img.naturalWidth,  sw = cr.w * p.img.naturalWidth;
    const sy = cr.y * p.img.naturalHeight, sh = cr.h * p.img.naturalHeight;
    c.drawImage(p.img, sx, sy, sw, sh, -p.w / 2 * mult, -p.h / 2 * mult, p.w * mult, p.h * mult);
    c.restore();
  });
  c.restore();
  return ec;
}
async function openPreview() {
  if (!slides.length) return;
  const track = document.getElementById('preview-track');
  const dots  = document.getElementById('preview-dots');
  track.innerHTML = ''; dots.innerHTML = '';
  previewUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch (e) {} });
  previewUrls = [];
  const mult = Math.min(2.5, (window.innerWidth * (window.devicePixelRatio || 1)) / W) || 1.2;
  for (let i = 0; i < slides.length; i++) {
    const panel = document.createElement('div'); panel.className = 'pv-panel';
    const img = document.createElement('img');
    const blob = await canvasToBlob(renderPreviewCanvas(i, mult));
    const url = URL.createObjectURL(blob); previewUrls.push(url);
    img.src = url; panel.appendChild(img); track.appendChild(panel);
    const d = document.createElement('div'); d.className = 'pvd' + (i === activeSlide ? ' on' : ''); dots.appendChild(d);
  }
  document.getElementById('preview').classList.add('show');
  requestAnimationFrame(() => { track.scrollLeft = activeSlide * track.clientWidth; });
}
function closePreview() {
  document.getElementById('preview').classList.remove('show');
  document.getElementById('preview-track').innerHTML = '';
  previewUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch (e) {} });
  previewUrls = [];
}

document.getElementById('preview-close').addEventListener('click', closePreview);

document.getElementById('preview-track').addEventListener('scroll', () => {

// Hex-Eingabe → Hintergrundfarbe der aktiven Slide
function applyBgHex() {
  const hex = normHex(document.getElementById('bgHexInput').value);
  if (!hex) { syncBgButtons(); return; }
  beginAction();
  slides[activeSlide].bg = hex;
  syncBgButtons();
  redraw();
  scheduleSave();
}
document.getElementById('bgHexInput').addEventListener('change', applyBgHex);
document.getElementById('bgHexInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); applyBgHex(); e.target.blur(); } });

// Background-Dropdown öffnen/schließen (fixed positioniert, damit es nicht

document.getElementById('bgToggle').addEventListener('click', (e) => {

document.addEventListener('click', (e) => {

// iOS-Fix: position:fixed-Menüs, die in der (scrollbaren/umbrechenden) Toolbar
// liegen, werden auf iOS abgeschnitten. Wir hängen sie ans <body>, damit sie

['formatMenu', 'textMenu', 'bgMenu'].forEach(id => {
